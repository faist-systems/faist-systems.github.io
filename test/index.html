<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>FAIST Systems</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0e1116;
      --text:#e6e6e6;
      --muted:#9aa0a6;
      --accent:#7f8790; /* šedá / grafit */
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header{
      padding:24px 48px;
    }

    header a{
      color:var(--muted);
      text-decoration:none;
      font-size:14px;
    }

    .hero{
      min-height:80vh;
      display:flex;
      align-items:center;
      padding:80px 48px;
      background:
        linear-gradient(rgba(14,17,22,.75), rgba(14,17,22,.9)),
        url("../assets/background/systems.png") center/cover no-repeat;
    }

    .hero h1{
      font-size:48px;
      margin-bottom:12px;
    }

    .hero p{
      color:var(--muted);
      max-width:520px;
    }

    .content{
      padding:80px 48px;
      background:#0b0e13;
    }

    footer{
      padding:40px;
      text-align:center;
      font-size:13px;
      color:var(--muted);
    }
  </style>
</head>

<body>

<header>
  <a href="../index.html">← FAIST Holding</a>
</header>

<section class="hero">
  <div>
    <h1>FAIST Systems</h1>
    <p>Stabilní infrastruktura, která drží celý ekosystém v chodu.</p>
  </div>
</section>

<section class="content">
  <!-- sem přijde budoucí systémový obsah / dashboard -->
</section>

<footer>© FAIST Systems</footer>

</body>
</html>
