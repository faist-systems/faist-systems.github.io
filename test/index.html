<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <title>FAIST Holding – Light Core</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        /* SCENE */
        .scene {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* BACKGROUND IMAGE */
        .background {
            position: absolute;
            inset: 0;
            background: url("../assets/bg/faist-bg.jpg") center center / cover no-repeat;
            z-index: 0;
        }

        /* NOISE OVERLAY */
        .noise {
            position: absolute;
            inset: 0;
            background: url("../assets/noise/noise.png") repeat;
            opacity: 0.05;
            mix-blend-mode: overlay;
            z-index: 1;
            pointer-events: none;
        }

        /* LIGHT CORE WRAPPER */
        .light-core {
            position: absolute;
            top: 0;
            left: 50%;
            width: 1px;
            height: 100%;
            transform: translateX(-50%);
            z-index: 5;
            pointer-events: none;
        }

        /* CORE – ostré jádro */
        .light-core::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            transform: translateX(-50%);
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 248, 220, 0.95) 20%,
                rgba(255, 215, 120, 1) 50%,
                rgba(255, 248, 220, 0.95) 80%,
                rgba(255, 255, 255, 0) 100%
            );
        }

        /* HALO – zlatý rozptyl */
        .light-core::after {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 120px;
            height: 100%;
            transform: translateX(-50%);
            background: radial-gradient(
                ellipse at center,
                rgba(255, 200, 80, 0.35) 0%,
                rgba(255, 180, 60, 0.18) 25%,
                rgba(255, 150, 40, 0.08) 45%,
                rgba(0, 0, 0, 0) 70%
            );
            filter: blur(12px);
        }

        /* ATMOSPHERIC GLOW */
        .light-atmosphere {
            position: absolute;
            top: 0;
            left: 50%;
            width: 420px;
            height: 100%;
            transform: translateX(-50%);
            background: radial-gradient(
                ellipse at center,
                rgba(255, 180, 90, 0.08) 0%,
                rgba(255, 180, 90, 0.04) 30%,
                rgba(0, 0, 0, 0) 70%
            );
            filter: blur(40px);
            z-index: 4;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="scene">
        <div class="background"></div>
        <div class="noise"></div>

        <div class="light-atmosphere"></div>
        <div class="light-core"></div>
    </div>
</body>
</html>
