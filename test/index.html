<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>F.A.I.S.T. Holding</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#0b0e16;
  --bg2:#12172a;
  --bg3:#07080d;
  --gold:rgba(200,160,80,.55);
  --gold-dim:rgba(200,160,80,.15);
  --text:#fff;
  --muted:#b6bcc6;
  --panel:rgba(255,255,255,.05);
  --border:rgba(255,255,255,.12);
}

*{box-sizing:border-box}
html,body{margin:0}

body{
  font-family:Inter,system-ui,sans-serif;
  color:var(--text);
  background:
    radial-gradient(1200px 800px at 20% 20%, var(--bg2), var(--bg1)),
    radial-gradient(1000px 700px at 80% 80%, #0e1325, var(--bg3));
  overflow-x:hidden;
  position:relative;
}

/* =========================
   GOLDEN THREADS BACKGROUND
   ========================= */
#threads{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}

.thread{
  position:absolute;
  width:1px;
  height:140%;
  background:linear-gradient(
    to bottom,
    transparent,
    var(--gold),
    var(--gold-dim),
    transparent
  );
  opacity:0;
  filter:blur(.3px);
  animation:
    thread-move linear infinite,
    thread-fade ease-in-out infinite;
}

@keyframes thread-move{
  from{transform:translateY(-20%)}
  to{transform:translateY(120%)}
}

@keyframes thread-fade{
  0%{opacity:0}
  20%{opacity:.6}
  80%{opacity:.6}
  100%{opacity:0}
}

/* ========================= */

.lang-switch{
  position:fixed;
  top:16px;
  right:16px;
  z-index:50;
}
.lang-switch img{width:22px}

.hero{
  min-height:100vh;
  display:grid;
  place-items:center;
  position:relative;
  z-index:1;
}

.brand-panel{
  position:absolute;
  top:24px;
  left:24px;
  width:340px;
  padding:18px 20px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  z-index:20;
}

.scene{
  position:relative;
  width:900px;
  height:900px;
  max-width:90vmin;
  max-height:90vmin;
}

.center{
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  pointer-events:none;
  z-index:5;
}

.center-inner{
  pointer-events:auto;
  cursor:pointer;
  text-align:center;
}

.center-inner img{
  width:220px;
  transition:.3s ease;
}

.center-inner:hover img{
  filter:drop-shadow(0 0 18px rgba(255,200,120,.5));
  transform:scale(1.04);
}

.ask-me{
  font-size:12px;
  color:var(--muted);
}

.orbit{
  position:absolute;
  inset:0;
  z-index:2;
}

.orbit-item{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  color:white;
  text-decoration:none;
}

.orbit-item img{
  width:130px;
  margin-bottom:6px;
  animation:spin 20s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0)}
  to{transform:rotate(360deg)}
}

/* AI */
#aiPanel{
  position:fixed;
  inset:0;
  background:rgba(10,12,17,.9);
  backdrop-filter:blur(6px);
  display:none;
  z-index:100;
  padding:32px;
}

#aiBox{
  max-width:720px;
  margin:auto;
  background:#0f1117;
  border:1px solid var(--border);
  border-radius:16px;
  padding:24px;
}

.ai-buttons{
  margin-top:24px;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.ai-buttons button{
  background:#1b2035;
  color:white;
  border:1px solid var(--border);
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
}

/* FOOTER */
.site-footer{
  background:#0a0c11;
  border-top:1px solid rgba(255,255,255,.08);
  padding:48px 24px;
  text-align:center;
  color:var(--muted);
  position:relative;
  z-index:1;
}
</style>
</head>

<body>

<div id="threads"></div>

<div class="lang-switch">
  <a href="/en/index.html"><img src="/assets/flags/gb.png"></a>
</div>

<section class="hero">
  <div class="brand-panel">
    <h1>F.A.I.S.T. Holding</h1>
    <p style="color:var(--muted)">
      Inteligentní systémy, výzkum a technologie.
    </p>
  </div>

  <div class="scene" id="scene">

    <div class="center">
      <div class="center-inner" id="centerClick">
        <img src="/assets/logos/faist-holding.png" alt="FAIST">
        <div class="ask-me">Zeptej se mě</div>
      </div>
    </div>

    <div class="orbit">
      <a class="orbit-item" href="/cs/divisions/systems.html"><img src="/assets/logos/faist-systems.png"><div>Systems</div></a>
      <a class="orbit-item" href="/cs/divisions/lab.html"><img src="/assets/logos/faist-lab.png"><div>Lab</div></a>
      <a class="orbit-item" href="/cs/divisions/digital.html"><img src="/assets/logos/faist-digital.png"><div>Digital</div></a>
      <a class="orbit-item" href="/cs/divisions/energy.html"><img src="/assets/logos/faist-energy.png"><div>Energy</div></a>
      <a class="orbit-item" href="/cs/divisions/security.html"><img src="/assets/logos/faist-security.png"><div>Security</div></a>
      <a class="orbit-item" href="/cs/divisions/edu.html"><img src="/assets/logos/faist-edu.png"><div>Edu</div></a>
    </div>

  </div>
</section>

<footer class="site-footer">
  © 2026 F.A.I.S.T. Holding
</footer>

<div id="aiPanel">
  <div id="aiBox">
    <h2>FAIST AI</h2>
    <div id="aiContent" style="color:var(--muted)"></div>
    <div class="ai-buttons">
      <button data-q="Co je FAIST?">Co je FAIST?</button>
      <button data-q="Divize">Divize</button>
      <button data-q="Zavřít">Zavřít</button>
    </div>
  </div>
</div>

<script>
/* GOLD THREADS */
const threads=document.getElementById("threads");

function spawnThread(){
  const t=document.createElement("div");
  t.className="thread";
  t.style.left=Math.random()*100+"%";
  const duration=30+Math.random()*40;
  t.style.animationDuration=duration+"s,"+(duration*0.8)+"s";
  threads.appendChild(t);
  setTimeout(()=>t.remove(),duration*1000);
}

setInterval(()=>{
  if(threads.children.length<7) spawnThread();
},4000);

/* AI */
const aiPanel=document.getElementById("aiPanel");
const aiContent=document.getElementById("aiContent");
const answers={
  "Co je FAIST?":"FAIST je technologický holding zaměřený na inteligentní systémy.",
  "Divize":"Systems, Lab, Digital, Energy, Security a Edu."
};

document.getElementById("centerClick").onclick=()=>{
  aiPanel.style.display="block";
  aiContent.innerHTML=answers["Co je FAIST?"];
};

aiPanel.onclick=e=>{
  if(e.target.dataset.q){
    if(e.target.dataset.q==="Zavřít") aiPanel.style.display="none";
    else aiContent.innerHTML=answers[e.target.dataset.q];
  }
};

/* ORBIT – stabilní */
(function(){
  const scene=document.getElementById("scene");
  const items=[...document.querySelectorAll(".orbit-item")];
  let radius=0,base=0,frozen=false,last=performance.now();

  items.forEach(el=>{
    el.onmouseenter=()=>frozen=true;
    el.onmouseleave=()=>{frozen=false;last=performance.now();}
  });

  function resize(){
    radius=Math.min(scene.clientWidth,scene.clientHeight)*0.34;
  }
  resize();
  window.onresize=resize;

  function anim(now){
    const dt=(now-last)/1000;
    last=now;
    if(!frozen) base+=(Math.PI*2/60)*dt;

    items.forEach((el,i)=>{
      const a=base+i*(Math.PI*2/items.length);
      el.style.transform=
        `translate(-50%,-50%) translate(${Math.cos(a)*radius}px,${Math.sin(a)*radius}px)`;
    });
    requestAnimationFrame(anim);
  }
  requestAnimationFrame(anim);
})();
</script>

</body>
</html>
