<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>F.A.I.S.T. Holding</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;
  height:100%;
  background:#000;
  color:#eee;
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
  overflow:hidden;
}

/* HEADER */
header{
  height:64px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 4vw;
}

/* LANG SWITCH – FIXNÍ ROZMĚR */
.lang-switch{
  display:flex;
  gap:10px;
}
.lang-switch a{
  width:26px;              /* ⬅ pevná šířka */
  height:16px;             /* ⬅ pevná výška */
  border-radius:3px;
  overflow:hidden;
  opacity:.45;
  border:1px solid rgba(255,255,255,.25);
  transition:opacity .25s ease, box-shadow .25s ease;
  flex-shrink:0;
}
.lang-switch a img{
  width:100%;
  height:100%;
  display:block;           /* ⬅ odstraní inline mezery */
  object-fit:cover;        /* ⬅ sjednocení různých poměrů */
}
.lang-switch a.active{
  opacity:1;
  box-shadow:0 0 0 1px rgba(255,215,120,.9);
}
.lang-switch a:hover{
  opacity:.85;
}

/* NAV */
header nav a{
  margin-left:24px;
  font-size:.85rem;
  color:#ccc;
  text-decoration:none;
}
header nav a:hover{color:#fff}

/* HERO */
.hero{
  text-align:center;
  margin-top:.5vh;
}
.hero h1{
  font-family:"Cinzel",serif;
  font-size:clamp(2.7rem,4.6vw,3.7rem);
  letter-spacing:.22em;
  color:#fff;
  text-shadow:
    0 0 16px rgba(255,215,120,.9),
    0 0 48px rgba(255,190,90,.7);
}
.hero .forge{
  margin-top:6px;
  font-size:.78rem;
  letter-spacing:.14em;
  opacity:.6;
}
.hero .claim{
  margin-top:6px;
  font-size:.95rem;
  opacity:.9;
}

/* AI */
.ai-guide{
  width:min(720px,90vw);
  margin:1.6vh auto 0;
  padding:18px 22px;
  border-radius:18px;
  background:rgba(12,12,12,.75);
  border:1px solid rgba(255,255,255,.12);
}
.ai-guide h4{
  font-family:"Cinzel",serif;
  font-size:.85rem;
  letter-spacing:.16em;
  margin-bottom:8px;
}
.ai-guide h4 span{opacity:.55}
.ai-guide input{
  width:100%;
  background:#000;
  border:1px solid rgba(255,215,120,.55);
  border-radius:16px;
  padding:8px 14px;
  color:#eee;
  font-size:.85rem;
}

/* DIVISIONS */
.divisions{
  position:absolute;
  top:46vh;
  left:0;
  width:100%;
  padding:0 6vw;
  display:flex;
  gap:1.6vw;
}
.division{width:calc(100%/6)}

.window{
  height:calc(100vh - 46vh - 32px - 24px);
  min-height:400px;
  max-height:500px;
  border-radius:22px;
  position:relative;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.08);
  display:flex;
  flex-direction:column;
  background-size:cover;
  background-position:center;
}

/* BACKGROUNDS */
.window.systems  {background-image:url("../assets/backgrounds/systems.png")}
.window.research {background-image:url("../assets/backgrounds/research.png")}
.window.digital  {background-image:url("../assets/backgrounds/digital.png")}
.window.energy   {background-image:url("../assets/backgrounds/energy.png")}
.window.security {background-image:url("../assets/backgrounds/security.png")}
.window.academy  {background-image:url("../assets/backgrounds/academy.png")}

/* FOOTER */
footer{
  position:absolute;
  bottom:0;
  width:100%;
  height:32px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:.7rem;
  opacity:.45;
}
</style>
</head>

<body>

<header>
  <div class="lang-switch">
    <a href="/index.html" class="active">
      <img src="../assets/flags/cs.png" alt="CZ">
    </a>
    <a href="/en/index.html">
      <img src="../assets/flags/en.png" alt="EN">
    </a>
  </div>
  <nav>
    <a href="#">Holding</a>
    <a href="#">Divize</a>
    <a href="#">O nás</a>
    <a href="#">Kontakt</a>
  </nav>
</header>

<div class="hero">
  <h1>F.A.I.S.T. HOLDING</h1>
  <div class="forge">Forge of Artificial Intelligence, Solutions and Technologies</div>
  <div class="claim">Inteligentní systém, který navrhuje, propojuje a vysvětluje komplexní struktury.</div>
</div>

<div class="ai-guide">
  <h4><strong>FAIST</strong> <span>· inteligentní průvodce</span></h4>
  <input placeholder="Ptejte se mě…">
</div>

<footer>© 2025 FAIST digital</footer>

</body>
</html>
