<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <title>FAIST Holding – Light Core</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .scene {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .background {
            position: absolute;
            inset: 0;
            background: url("../assets/bg/faist-bg.jpg") center center / cover no-repeat;
            z-index: 0;
        }

        .noise {
            position: absolute;
            inset: 0;
            background: url("../assets/noise/noise.png") repeat;
            opacity: 0.05;
            mix-blend-mode: overlay;
            z-index: 1;
            pointer-events: none;
        }

        /* ===== LIGHT CORE ===== */

        .light-atmosphere {
            position: absolute;
            top: 0;
            left: 50%;
            width: 420px;
            height: 100%;
            transform: translateX(-50%);
            background: radial-gradient(
                ellipse at center,
                rgba(255, 180, 90, 0.08) 0%,
                rgba(255, 180, 90, 0.04) 30%,
                rgba(0, 0, 0, 0) 70%
            );
            filter: blur(40px);
            z-index: 4;
            pointer-events: none;
        }

        .light-core {
            position: absolute;
            top: 0;
            left: 50%;
            width: 1px;
            height: 100%;
            transform: translateX(-50%);
            z-index: 6;
            pointer-events: none;
        }

        .light-core::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            transform: translateX(-50%);
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 248, 220, 0.95) 20%,
                rgba(255, 215, 120, 1) 50%,
                rgba(255, 248, 220, 0.95) 80%,
                rgba(255, 255, 255, 0) 100%
            );
        }

        .light-core::after {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 120px;
            height: 100%;
            transform: translateX(-50%);
            background: radial-gradient(
                ellipse at center,
                rgba(255, 200, 80, 0.35) 0%,
                rgba(255, 180, 60, 0.18) 25%,
                rgba(255, 150, 40, 0.08) 45%,
                rgba(0, 0, 0, 0) 70%
            );
            filter: blur(12px);
        }

        /* ===== HORIZONTAL FEEDS ===== */

        .feeds {
            position: absolute;
            inset: 0;
            z-index: 5;
            pointer-events: none;
        }

        .feed {
            position: absolute;
            left: 50%;
            height: 2px;
            transform-origin: left center;
        }

        /* ostré jádro feedu */
        .feed::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to right,
                rgba(255, 215, 120, 1) 0%,
                rgba(255, 200, 100, 0.8) 40%,
                rgba(255, 180, 80, 0.4) 70%,
                rgba(255, 180, 80, 0) 100%
            );
        }

        /* halo feedu */
        .feed::after {
            content: "";
            position: absolute;
            top: -20px;
            left: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(
                to right,
                rgba(255, 200, 100, 0.25) 0%,
                rgba(255, 180, 80, 0.12) 40%,
                rgba(255, 180, 80, 0) 100%
            );
            filter: blur(14px);
        }

        /* POSITIONING FEEDS */
        .feed.f1 { top: 62%; width: 32vw; }
        .feed.f2 { top: 62%; width: 32vw; transform: scaleX(-1); }

        .feed.f3 { top: 72%; width: 38vw; }
        .feed.f4 { top: 72%; width: 38vw; transform: scaleX(-1); }

        .feed.f5 { top: 82%; width: 44vw; }
        .feed.f6 { top: 82%; width: 44vw; transform: scaleX(-1); }

    </style>
</head>

<body>
    <div class="scene">
        <div class="background"></div>
        <div class="noise"></div>

        <div class="light-atmosphere"></div>
        <div class="light-core"></div>

        <div class="feeds">
            <div class="feed f1"></div>
            <div class="feed f2"></div>
            <div class="feed f3"></div>
            <div class="feed f4"></div>
            <div class="feed f5"></div>
            <div class="feed f6"></div>
        </div>
    </div>
</body>
</html>
