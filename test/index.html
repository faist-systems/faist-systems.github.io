<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>F.A.I.S.T. Holding</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
  width:100%;
  height:100%;
  background:#000;
  color:#eee;
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
  overflow:hidden;
}

/* ================= HEADER ================= */
header{
  position:relative;
  z-index:30;
  height:64px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  padding:0 4vw;
}

.header-right{
  display:flex;
  align-items:center;
  gap:26px;
}

.header-right nav{
  display:flex;
  gap:22px;
}

.header-right nav a{
  font-size:.85rem;
  color:#ccc;
  text-decoration:none;
}
.header-right nav a:hover{color:#fff}

.header-right .contact{
  font-size:.85rem;
  color:#ccc;
  text-decoration:none;
}
.header-right .contact:hover{color:#fff}

.lang-flag{
  width:26px;
  height:16px;
  border-radius:3px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.25);
  opacity:.75;
  transition:.25s;
}
.lang-flag img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.lang-flag:hover{
  opacity:1;
  box-shadow:0 0 0 1px rgba(255,215,120,.9);
}

/* ================= BACKGROUND ================= */
.background,
.noise{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.background{
  background:
    radial-gradient(circle at center, rgba(255,200,120,.03), transparent 60%),
    linear-gradient(to bottom,#050505,#000 70%);
  z-index:0;
}
.noise{
  background-image:repeating-radial-gradient(
    circle,
    rgba(255,255,255,.02) 0 1px,
    transparent 1px 2px
  );
  background-size:2px 2px;
  opacity:.15;
  mix-blend-mode:overlay;
  z-index:1;
}

/* ================= HERO ================= */
.hero{
  position:relative;
  z-index:5;
  text-align:center;
  margin-top:1vh;
}

.hero h1{
  font-family:"Cinzel",serif;
  font-size:clamp(2.7rem,4.6vw,3.7rem);
  letter-spacing:.22em;
  text-shadow:
    0 0 16px rgba(255,215,120,.9),
    0 0 48px rgba(255,190,90,.7);
}

.hero .forge{
  margin-top:6px;
  font-size:.78rem;
  letter-spacing:.14em;
  opacity:.65;
}

.hero .claim{
  margin-top:6px;
  font-size:.95rem;
  opacity:.9;
}

/* ================= AI ================= */
.ai-guide{
  position:relative;
  z-index:5;
  width:min(720px,90vw);
  margin:1.8vh auto 0;
  padding:18px 22px;
  border-radius:18px;
  background:rgba(12,12,12,.75);
  border:1px solid rgba(255,255,255,.12);
}

.ai-guide h4{
  font-family:"Cinzel",serif;
  font-size:.85rem;
  letter-spacing:.16em;
  margin-bottom:8px;
}
.ai-guide h4 span{opacity:.55}

.ai-guide input{
  width:100%;
  background:#000;
  border:1px solid rgba(255,215,120,.55);
  border-radius:16px;
  padding:8px 14px;
  color:#eee;
  font-size:.85rem;
}

/* ================= DIVISIONS ================= */
.divisions{
  position:absolute;
  top:46vh;
  left:0;
  width:100%;
  padding:0 6vw;
  display:flex;
  gap:1.6vw;
  z-index:4;
}

.division{width:calc(100%/6)}

.window{
  height:calc(100vh - 46vh - 32px - 24px);
  min-height:420px;
  max-height:500px;
  border-radius:22px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.08);
  display:flex;
  flex-direction:column;
  background-size:cover;
  background-position:center;
}

/* IMAGE */
.image-slot{
  height:170px;
  margin:14px 16px 0;
  border-radius:14px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.18);
}
.image-slot img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(.72);
}

/* CONTENT – FLEX, VÝŠKA SE DOROVNÁ JS */
.content{
  margin:12px 16px 16px;
  padding:14px;
  border-radius:12px;
  background:rgba(0,0,0,.65);
  display:flex;
  flex-direction:column;
}

.content h3{font-size:.95rem}
.content p{font-size:.82rem;opacity:.85}

.more{
  margin-top:auto;
  font-size:.82rem;
  color:rgb(255,215,120);
  text-decoration:none;
}

/* ================= FOOTER ================= */
footer{
  position:absolute;
  bottom:0;
  width:100%;
  height:32px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:.7rem;
  opacity:.45;
  z-index:10;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="noise"></div>

<header>
  <div class="header-right">
    <nav>
      <a href="#">Holding</a>
      <a href="#">Divize</a>
      <a href="#">O nás</a>
    </nav>
    <a href="cs/header/contacts.html" class="contact">Kontakt</a>
    <a href="/en/index.html" class="lang-flag"><img src="/assets/flags/gb.png" alt="EN"></a>
  </div>
</header>

<div class="hero">
  <h1>F.A.I.S.T. HOLDING</h1>
  <div class="forge">Forge of Artificial Intelligence, Solutions and Technologies</div>
  <div class="claim">Inteligentní systém, který navrhuje, propojuje a vysvětluje komplexní struktury.</div>
</div>

<div class="ai-guide">
  <h4><strong>FAIST</strong> <span>· inteligentní průvodce</span></h4>
  <input placeholder="Ptejte se mě…">
</div>

<div class="divisions">
  <!-- obsah divizí zůstává stejný jako předtím -->
</div>

<footer>© 2025 FAIST digital</footer>

<script>
window.addEventListener("load",()=>{
  const blocks=[...document.querySelectorAll(".content")];
  let max=0;
  blocks.forEach(b=>{max=Math.max(max,b.offsetHeight)});
  blocks.forEach(b=>b.style.minHeight=max+"px");
});
</script>

</body>
</html>
