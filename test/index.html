<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>F.A.I.S.T. Holding</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;color:#eee;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
body{overflow:hidden}

/* HEADER / FOOTER */
header,footer{
  height:64px;
  display:flex;
  align-items:center;
  padding:0 4vw;
  position:relative;
  z-index:10;
}
footer{
  height:36px;
  justify-content:center;
  font-size:.75rem;
  opacity:.5;
}

/* MAIN */
main{height:calc(100vh - 64px);position:relative}

/* BACKGROUND */
.background{position:absolute;inset:0;
  background:radial-gradient(circle at center,rgba(255,200,120,.02),transparent 60%),
  linear-gradient(to bottom,#050505,#000 70%)}
.noise{position:absolute;inset:0;
  background-image:repeating-radial-gradient(circle,rgba(255,255,255,.02) 0 1px,transparent 1px 2px);
  background-size:2px 2px;opacity:.15;mix-blend-mode:overlay}

/* HERO */
.hero{text-align:center;margin-top:6vh;position:relative;z-index:5}
.hero h1{
  font-family:"Cinzel",serif;
  font-size:clamp(2.6rem,4.6vw,3.6rem);
  letter-spacing:.22em;
  text-shadow:0 2px 4px rgba(255,215,120,.35),0 0 1px rgba(255,215,120,.5)
}

/* BUS */
.bus-wrap{
  position:absolute;
  top:42%;
  left:50%;
  transform:translateX(-50%);
  width:1100px;
  max-width:90vw;
}
.bus{height:2px;background:rgba(255,215,120,.25);position:relative}

/* MAIN DROP */
.pulse{
  position:absolute;
  left:50%;
  width:6px;
  height:26px;
  transform:translate(-50%,-80px);
  background:linear-gradient(to bottom,transparent,rgba(255,220,150,1),transparent);
  border-radius:4px;
  opacity:0;
  transition:transform 1.6s ease-in, opacity .3s;
}

/* BUS DROPS */
.bus-drop{
  position:absolute;
  top:0;
  width:2px;
  height:22px;
  background:linear-gradient(to bottom,rgba(255,215,120,.5),transparent)
}

/* BRANCH DROPS */
.branch-drop{
  position:absolute;
  top:22px;
  width:4px;
  height:0;
  transform:translateX(-50%);
  background:linear-gradient(to bottom,rgba(255,220,150,1),transparent);
  opacity:0;
  transition:height .8s ease-in, opacity .3s;
}

/* DIVISIONS */
.divisions{
  position:absolute;
  bottom:60px;
  width:100%;
  padding:0 6vw;
  display:flex;
  gap:1.4vw;
}
.division{width:calc(100%/6)}
.window{
  height:260px;
  padding:18px;
  border-radius:20px;
  background:rgba(12,12,12,.75);
  border:1px solid rgba(255,255,255,.08);
  transition:box-shadow .3s ease;
}
.window.active{box-shadow:0 0 0 1px var(--accent)}

/* ACCENTS */
.systems{--accent:rgba(120,180,255,.45)}
.research{--accent:rgba(170,120,255,.45)}
.digital{--accent:rgba(120,220,255,.45)}
.energy{--accent:rgba(255,180,90,.45)}
.security{--accent:rgba(120,255,180,.45)}
.academy{--accent:rgba(255,220,140,.45)}
</style>
</head>

<body>

<header>FAIST</header>

<main>
<div class="background"></div><div class="noise"></div>

<div class="hero"><h1>F.A.I.S.T. HOLDING</h1></div>

<div class="pulse" id="pulse"></div>

<div class="bus-wrap" id="bus">
  <div class="bus"></div>

  <!-- svody + kapky -->
  <script>
    for(let i=0;i<6;i++){
      document.write(`<div class="bus-drop" style="left:${i*20}%"></div>`);
      document.write(`<div class="branch-drop" style="left:${i*20}%"></div>`);
    }
  </script>
</div>

<div class="divisions">
  <div class="division"><div class="window systems">Systems</div></div>
  <div class="division"><div class="window research">Research</div></div>
  <div class="division"><div class="window digital">Digital</div></div>
  <div class="division"><div class="window energy">Energy</div></div>
  <div class="division"><div class="window security">Security</div></div>
  <div class="division"><div class="window academy">Academy</div></div>
</div>
</main>

<footer>© FAIST Holding</footer>

<script>
window.onload = () => {
  const pulse = document.getElementById("pulse");
  const branches = document.querySelectorAll(".branch-drop");
  const windows  = document.querySelectorAll(".window");

  const sequence = [
    [2,3],
    [1,4],
    [0,5]
  ];

  function runCycle(){
    pulse.style.opacity = 1;
    pulse.style.transform = "translate(-50%,-80px)";
    branches.forEach(b=>{b.style.height=0;b.style.opacity=0});
    windows.forEach(w=>w.classList.remove("active"));

    // pád na bus
    setTimeout(()=>{
      pulse.style.transform = "translate(-50%,0)";
    },50);

    // sekvence
    sequence.forEach((pair,step)=>{
      setTimeout(()=>{
        pair.forEach(i=>{
          branches[i].style.opacity = 1;
          branches[i].style.height = "140px";
          windows[i].classList.add("active");
        });

        // zhasnutí předchozího
        if(step>0){
          sequence[step-1].forEach(i=>{
            windows[i].classList.remove("active");
          });
        }
      },1800 + step*900);
    });

    // konec
    setTimeout(()=>{
      pulse.style.opacity = 0;
      windows.forEach(w=>w.classList.remove("active"));
    },1800 + sequence.length*900);
  }

  runCycle();
  setInterval(runCycle,12000);
};
</script>

</body>
</html>
