<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>F.A.I.S.T. Holding</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f1117;
  --text:#ffffff;
  --muted:#b6bcc6;
  --panel:rgba(255,255,255,.04);
  --border:rgba(255,255,255,.12);
  --gold1:rgba(255,200,80,.6);
  --gold2:rgba(255,160,40,.4);
}

*{box-sizing:border-box}
html,body{margin:0}

body{
  font-family:Inter,system-ui,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 20% 20%, #1b2035, var(--bg)),
    radial-gradient(circle at 80% 80%, #12162a, var(--bg));
}

/* LANGUAGE SWITCH */
.lang-switch{
  position:fixed;
  top:20px;
  right:20px;
  z-index:50;
}
.lang-switch img{width:22px}

/* HERO */
.hero{
  min-height:100vh;
  display:grid;
  place-items:center;
  position:relative;
  overflow:hidden;
}

/* LEFT PANEL */
.brand-panel{
  position:absolute;
  top:32px;
  left:32px;
  width:360px;
  padding:20px 22px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  z-index:20;
}

/* SCENE */
.scene{
  position:relative;
  width:900px;
  height:900px;
  max-width:90vmin;
  max-height:90vmin;
}

/* CENTER STACK */
.center-stack{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  z-index:3;
}

/* MAIN LOGO */
.center-stack img{
  width:220px;
  cursor:pointer;
  transition:filter .3s ease, transform .3s ease;
}
.center-stack img.ai-glow{
  filter:
    drop-shadow(0 0 16px var(--gold1))
    drop-shadow(0 0 36px var(--gold2));
  transform:scale(1.04);
}

/* ASK ME */
.ask-me{
  margin-top:6px;
  font-size:12px;
  color:var(--muted);
  cursor:pointer;
}
.ask-me:hover{
  text-shadow:0 0 10px var(--gold1);
}

/* INNER TEXT */
.inner-orbit{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:1;
}
.inner-orbit span{
  position:absolute;
  top:50%;
  left:50%;
  transform-origin:0 0;
  white-space:nowrap;
  font-size:12px;
  letter-spacing:1.4px;
  color:#e6ebf5;
}

/* ORBIT */
.orbit{
  position:absolute;
  inset:0;
  z-index:2;
}
.orbit-item{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  color:#fff;
  text-decoration:none;
}
.orbit-item img{
  width:130px;
  margin:0 auto 6px;
  display:block;
  animation:spin 20s linear infinite;
}
.orbit-item .label{
  font-size:14px;
  color:#fff;
}
.orbit-item::after{
  content:attr(data-desc);
  position:absolute;
  bottom:115%;
  left:50%;
  transform:translateX(-50%) translateY(6px);
  background:#0a0c11;
  border:1px solid var(--border);
  border-radius:8px;
  padding:8px 10px;
  font-size:12px;
  color:var(--muted);
  white-space:nowrap;
  opacity:0;
  pointer-events:none;
  transition:.25s ease;
}
.orbit-item:hover::after{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

@keyframes spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

/* FOOTER */
.site-footer{
  background:#0a0c11;
  border-top:1px solid rgba(255,255,255,.08);
  padding:48px 24px;
}

/* === AI MODAL === */
.ai-modal{
  position:fixed;
  inset:0;
  background:rgba(10,12,17,.75);
  display:none;
  place-items:center;
  z-index:200;
}
.ai-modal.open{display:grid}

.ai-box{
  position:relative;
  background:#0a0c11;
  border:1px solid var(--border);
  border-radius:14px;
  padding:26px 28px 30px;
  width:100%;
  max-width:420px;
  color:#fff;
}

.ai-box h3{
  margin:0 0 6px;
  letter-spacing:2px;
}
.ai-intro{
  font-size:13px;
  color:var(--muted);
  margin-bottom:16px;
}

.ai-box input{
  width:100%;
  padding:10px 12px;
  background:#0f1117;
  border:1px solid var(--border);
  border-radius:8px;
  color:#fff;
  font-size:14px;
}

.ai-answer{
  margin-top:16px;
  font-size:14px;
  line-height:1.6;
  color:#e6ebf5;
}

.ai-answer a{
  display:inline-block;
  margin-top:10px;
  color:#fff;
  text-decoration:none;
  border-bottom:1px solid rgba(255,255,255,.3);
}

.ai-close{
  position:absolute;
  top:10px;
  right:12px;
  background:none;
  border:none;
  color:#fff;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="lang-switch">
  <a href="/en/index.html"><img src="/assets/flags/gb.png"></a>
</div>

<section class="hero">

  <div class="brand-panel">
    <h1>F.A.I.S.T. Holding</h1>
    <p style="color:var(--muted)">
      Navrhujeme inteligentní systémy propojující umělou inteligenci,
      vědu a moderní technologie.
    </p>
  </div>

  <div class="scene" id="scene">

    <div class="center-stack">
      <img id="mainLogo" src="/assets/logos/faist-holding.png" alt="FAIST">
      <div class="ask-me" id="askAI">Zeptej se mě</div>
    </div>

    <div class="inner-orbit" id="innerOrbit"></div>

    <div class="orbit">
      <a class="orbit-item" href="/cs/divisions/systems.html" data-desc="Firemní systémy"><img src="/assets/logos/faist-systems.png"><div class="label">Systems</div></a>
      <a class="orbit-item" href="/cs/divisions/lab.html" data-desc="Výzkum a prototypy"><img src="/assets/logos/faist-lab.png"><div class="label">Lab</div></a>
      <a class="orbit-item" href="/cs/divisions/digital.html" data-desc="Digitální produkty"><img src="/assets/logos/faist-digital.png"><div class="label">Digital</div></a>
      <a class="orbit-item" href="/cs/divisions/energy.html" data-desc="Energetická řešení"><img src="/assets/logos/faist-energy.png"><div class="label">Energy</div></a>
      <a class="orbit-item" href="/cs/divisions/security.html" data-desc="Bezpečnost"><img src="/assets/logos/faist-security.png"><div class="label">Security</div></a>
      <a class="orbit-item" href="/cs/divisions/edu.html" data-desc="Vzdělávání"><img src="/assets/logos/faist-edu.png"><div class="label">Edu</div></a>
    </div>

  </div>
</section>

<footer class="site-footer"></footer>

<!-- AI MODAL -->
<div class="ai-modal" id="aiModal">
  <div class="ai-box">
    <button class="ai-close" id="closeAI">✕</button>
    <h3>FAIST AI</h3>
    <p class="ai-intro">Zeptej se na cokoliv ohledně FAIST nebo našich divizí.</p>
    <input id="aiInput" placeholder="Na co se chcete zeptat?">
    <div class="ai-answer" id="aiAnswer"></div>
  </div>
</div>

<script>
/* SCROLL FIX */
if ('scrollRestoration' in history) history.scrollRestoration='manual';
window.addEventListener('load',()=>window.scrollTo(0,0));

/* AI OPEN */
const logo=document.getElementById('mainLogo');
const ask=document.getElementById('askAI');
const modal=document.getElementById('aiModal');
const input=document.getElementById('aiInput');
const answer=document.getElementById('aiAnswer');

[logo,ask].forEach(el=>{
  el.addEventListener('mouseenter',()=>logo.classList.add('ai-glow'));
  el.addEventListener('mouseleave',()=>logo.classList.remove('ai-glow'));
  el.addEventListener('click',()=>{
    modal.classList.add('open');
    input.focus();
  });
});

document.getElementById('closeAI').onclick=()=>modal.classList.remove('open');
modal.addEventListener('click',e=>{
  if(e.target===modal) modal.classList.remove('open');
});

/* AI RULES */
const rules=[
  {keys:['faist','holding','kdo'],text:'FAIST je technologický holding propojující AI, vývoj systémů, výzkum a moderní technologie.'},
  {keys:['ai','automatizace'],text:'AI využíváme pro automatizaci procesů a chytré systémy.',link:['Systems','/cs/divisions/systems.html']},
  {keys:['výzkum','lab'],text:'FAIST Lab se zaměřuje na výzkum a prototypy.',link:['Lab','/cs/divisions/lab.html']},
  {keys:['bezpečnost'],text:'Bezpečnost řeší divize Security.',link:['Security','/cs/divisions/security.html']}
];

input.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  const q=input.value.toLowerCase();
  const r=rules.find(r=>r.keys.some(k=>q.includes(k)));
  answer.innerHTML=r
    ? r.text+(r.link?`<br><a href="${r.link[1]}">${r.link[0]}</a>`:'')
    : 'Tomu zatím nerozumím. Zkus se zeptat jinak.';
});
</script>

</body>
</html>
