<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>F.A.I.S.T. Holding</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;color:#eee;
font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
body{overflow:hidden}

/* HEADER */
header{
  height:64px;
  display:flex;
  align-items:center;
  padding:0 4vw;
  position:relative;
  z-index:10;
}

/* MAIN */
main{
  height:calc(100vh - 64px);
  position:relative;
}

/* BACKGROUND */
.background{
  position:absolute;inset:0;
  background:
    radial-gradient(circle at center, rgba(255,200,120,.02), transparent 60%),
    linear-gradient(to bottom,#050505,#000 70%);
}
.noise{
  position:absolute;inset:0;
  background-image:repeating-radial-gradient(circle,
    rgba(255,255,255,.02) 0 1px, transparent 1px 2px);
  background-size:2px 2px;
  opacity:.15;
  mix-blend-mode:overlay;
}

/* HERO */
.hero{
  position:relative;
  z-index:5;
  text-align:center;
  margin-top:6vh;
}
.hero h1{
  font-family:"Cinzel",serif;
  font-size:clamp(2.6rem,4.6vw,3.6rem);
  letter-spacing:.22em;
  text-shadow:
    0 2px 4px rgba(255,215,120,.35),
    0 0 1px rgba(255,215,120,.5);
}

/* BUS */
.bus-wrap{
  position:absolute;
  top:42%;
  left:50%;
  transform:translateX(-50%);
  width:1100px;
  max-width:90vw;
  height:2px;
}
.bus{
  width:100%;
  height:2px;
  background:rgba(255,215,120,.25);
}

/* HORIZONTAL FLOW */
.flow{
  position:absolute;
  top:0;
  height:3px;
  background:linear-gradient(to right,
    rgba(255,215,120,.9),
    transparent);
  opacity:0;
  transition:width 1.6s ease-out, opacity .3s;
}
.flow.left{
  right:50%;
  transform:scaleX(-1);
}
.flow.right{
  left:50%;
}

/* BUS DROPS */
.bus-drop{
  position:absolute;
  top:0;
  width:2px;
  height:22px;
  background:linear-gradient(to bottom,
    rgba(255,215,120,.5),
    transparent);
}

/* MAIN DROP */
.pulse{
  position:absolute;
  top:120px;
  left:50%;
  width:6px;
  height:26px;
  transform:translate(-50%,-40px);
  background:linear-gradient(to bottom,
    transparent,
    rgba(255,220,150,1),
    transparent);
  border-radius:4px;
  opacity:0;
  transition:
    transform 1.8s ease-in,
    opacity .3s;
}

/* BRANCH DROPS */
.branch-drop{
  position:absolute;
  top:22px;
  width:4px;
  height:0;
  transform:translateX(-50%);
  background:linear-gradient(to bottom,
    rgba(255,220,150,1),
    transparent);
  opacity:0;
  transition:height .9s ease-in, opacity .3s;
}

/* DIVISIONS */
.divisions{
  position:absolute;
  bottom:5vh;
  left:0;
  width:100%;
  padding:0 6vw;
  display:flex;
  gap:1.4vw;
}
.division{width:calc(100%/6)}

.window{
  height:260px;
  padding:18px;
  border-radius:20px;
  background:rgba(12,12,12,.75);
  border:1px solid rgba(255,255,255,.08);
  display:flex;
  flex-direction:column;
  transition:box-shadow .4s ease;
}
.window.active{
  box-shadow:0 0 0 1px var(--accent);
}

/* ACCENTS */
.systems{--accent:rgba(120,180,255,.45)}
.research{--accent:rgba(170,120,255,.45)}
.digital{--accent:rgba(120,220,255,.45)}
.energy{--accent:rgba(255,180,90,.45)}
.security{--accent:rgba(120,255,180,.45)}
.academy{--accent:rgba(255,220,140,.45)}
</style>
</head>

<body>

<header><div>FAIST</div></header>

<main>
<div class="background"></div>
<div class="noise"></div>

<div class="hero"><h1>F.A.I.S.T. HOLDING</h1></div>

<div class="pulse" id="pulse"></div>

<div class="bus-wrap" id="bus">
  <div class="bus"></div>

  <div class="flow left" id="flowL"></div>
  <div class="flow right" id="flowR"></div>

  <div class="bus-drop" style="left:0%"></div>
  <div class="bus-drop" style="left:20%"></div>
  <div class="bus-drop" style="left:40%"></div>
  <div class="bus-drop" style="left:60%"></div>
  <div class="bus-drop" style="left:80%"></div>
  <div class="bus-drop" style="left:100%"></div>

  <div class="branch-drop" style="left:0%"></div>
  <div class="branch-drop" style="left:20%"></div>
  <div class="branch-drop" style="left:40%"></div>
  <div class="branch-drop" style="left:60%"></div>
  <div class="branch-drop" style="left:80%"></div>
  <div class="branch-drop" style="left:100%"></div>
</div>

<div class="divisions">
  <div class="division"><div class="window systems">Systems</div></div>
  <div class="division"><div class="window research">Research</div></div>
  <div class="division"><div class="window digital">Digital</div></div>
  <div class="division"><div class="window energy">Energy</div></div>
  <div class="division"><div class="window security">Security</div></div>
  <div class="division"><div class="window academy">Academy</div></div>
</div>
</main>

<script>
window.onload = () => {
  const pulse = document.getElementById("pulse");
  const flowL = document.getElementById("flowL");
  const flowR = document.getElementById("flowR");
  const branches = document.querySelectorAll(".branch-drop");
  const windows  = document.querySelectorAll(".window");

  function runCycle(){
    pulse.style.opacity = 1;
    pulse.style.transform = "translate(-50%,-40px)";

    flowL.style.width = "0";
    flowR.style.width = "0";
    flowL.style.opacity = 0;
    flowR.style.opacity = 0;

    branches.forEach(b=>{
      b.style.height = "0";
      b.style.opacity = 0;
    });
    windows.forEach(w=>w.classList.remove("active"));

    // pád kapky
    setTimeout(()=>{
      pulse.style.transform = "translate(-50%,220px)";
    },50);

    // rozdělení
    setTimeout(()=>{
      pulse.style.opacity = 0;

      flowL.style.opacity = 1;
      flowR.style.opacity = 1;
      flowL.style.width = "550px";
      flowR.style.width = "550px";

      branches.forEach((b,i)=>{
        const dist = Math.abs(i - 2.5);
        const delay = 400 + dist * dist * 350;

        setTimeout(()=>{
          b.style.opacity = 1;
          b.style.height = "120px"; // KONČÍ NA HORNÍ HRANĚ RÁMEČKU

          // sekvenční svícení
          windows.forEach(w=>w.classList.remove("active"));
          windows[i].classList.add("active");
        },delay);
      });

    },1800);
  }

  runCycle();
  setInterval(runCycle,12000);
};
</script>

</body>
</html>
