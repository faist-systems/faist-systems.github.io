name: Sync CS to EN structure

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write   # ⬅️ KRITICKÉ – bez toho nejde push

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync cs to en (structure + content, no overwrite)
        run: |
          echo "Syncing cs -> en (no overwrite)"

          find cs -type f | while read file; do
            target="en/${file#cs/}"

            # Pokud EN soubor existuje, nepřepisujeme
            if [ -f "$target" ]; then
              continue
            fi

            mkdir -p "$(dirname "$target")"
            cp "$file" "$target"

            if [[ "$target" == *.html ]]; then
              sed -i '1i<!-- AUTO-COPIED FROM CS | NOT TRANSLATED YET -->' "$target"
            fi
          done

      - name: Commit changes (if any)
        run: |
          if git status --porcelain | grep .; then
            git config user.name "FAIST Bot"
            git config user.email "faist-bot@users.noreply.github.com"
            git add en
            git commit -m "Sync EN structure from CS (auto)"
            git push
          else
            echo "No changes to commit"
          fi
