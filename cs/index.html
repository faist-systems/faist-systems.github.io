<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>F.A.I.S.T. Holding</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f1117;
  --text:#ffffff;
  --muted:#b6bcc6;
  --panel:rgba(255,255,255,.04);
  --border:rgba(255,255,255,.12);
  --gold1:rgba(255,200,80,.55);
  --gold2:rgba(255,160,40,.35);
}

*{box-sizing:border-box}
html,body{margin:0}

body{
  font-family:Inter,system-ui,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 20% 20%, #1b2035, var(--bg)),
    radial-gradient(circle at 80% 80%, #12162a, var(--bg));
}

/* HERO */
.hero{
  min-height:100vh;
  display:grid;
  place-items:center;
  position:relative;
}

/* LEFT PANEL */
.brand-panel{
  position:absolute;
  top:32px;
  left:32px;
  width:360px;
  padding:20px 22px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  z-index:20;
}

/* SCENE */
.scene{
  position:relative;
  width:900px;
  height:900px;
  max-width:90vmin;
  max-height:90vmin;
}

/* ===== ORBIT LAYER ===== */
.orbit-layer{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.center{
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
}
.center img{
  width:220px;
}

.inner-orbit{
  position:absolute;
  inset:0;
}

.inner-orbit span{
  position:absolute;
  top:50%;
  left:50%;
  transform-origin:0 0;
  white-space:nowrap;
  font-size:13px;
  letter-spacing:2px;
  color:#e6ebf5;
}

.orbit{
  position:absolute;
  inset:0;
}

.orbit-item{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  pointer-events:auto; /* ← KLÍČOVÁ OPRAVA */
}

.orbit-item img{
  width:130px;
  margin:0 auto 6px;
  display:block;
  animation:spin 20s linear infinite;
}

.orbit-item .label{
  font-size:14px;
  letter-spacing:1px;
}

@keyframes spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

/* ===== AI OVERLAY ===== */
.ai-layer{
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  z-index:10;
  pointer-events:none;
}

.ai-trigger{
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
  pointer-events:auto;
}

.ai-trigger img{
  width:220px;
  transition:filter .35s ease, transform .35s ease;
}

.ai-trigger:hover img{
  filter:
    drop-shadow(0 0 14px var(--gold1))
    drop-shadow(0 0 32px var(--gold2));
  transform:scale(1.04);
}

.ai-trigger span{
  margin-top:6px;
  font-size:12px;
  color:var(--muted);
}

/* FOOTER */
.site-footer{
  background:#0a0c11;
  border-top:1px solid rgba(255,255,255,.08);
  padding:48px 24px;
}
</style>
</head>

<body>

<section class="hero">

  <div class="brand-panel">
    <h1>F.A.I.S.T. Holding</h1>
    <p style="color:var(--muted)">
      Navrhujeme inteligentní systémy propojující umělou inteligenci,
      vědu a moderní technologie.
    </p>
  </div>

  <div class="scene" id="scene">

    <div class="orbit-layer">
      <div class="center">
        <img src="/assets/logos/faist-holding.png" alt="FAIST Holding">
      </div>

      <div class="inner-orbit" id="innerOrbit"></div>

      <div class="orbit">
        <a class="orbit-item" href="/cs/divisions/systems.html"><img src="/assets/logos/faist-systems.png"><div class="label">Systems</div></a>
        <a class="orbit-item" href="/cs/divisions/lab.html"><img src="/assets/logos/faist-lab.png"><div class="label">Lab</div></a>
        <a class="orbit-item" href="/cs/divisions/digital.html"><img src="/assets/logos/faist-digital.png"><div class="label">Digital</div></a>
        <a class="orbit-item" href="/cs/divisions/energy.html"><img src="/assets/logos/faist-energy.png"><div class="label">Energy</div></a>
        <a class="orbit-item" href="/cs/divisions/security.html"><img src="/assets/logos/faist-security.png"><div class="label">Security</div></a>
        <a class="orbit-item" href="/cs/divisions/edu.html"><img src="/assets/logos/faist-edu.png"><div class="label">Edu</div></a>
      </div>
    </div>

    <div class="ai-layer">
      <div class="ai-trigger" id="openAI">
        <img src="/assets/logos/faist-holding.png" alt="FAIST AI">
        <span>Zeptej se mě</span>
      </div>
    </div>

  </div>
</section>

<footer class="site-footer">
  <div class="footer-grid">
    <p style="color:var(--muted)">© FAIST Holding</p>
  </div>
</footer>

<script>
/* INNER TEXT */
const text="Forge of Artificial Intelligence, Science & Technology • ";
const inner=document.getElementById("innerOrbit");
let textAngle=0;

text.split("").forEach((c,i)=>{
  const s=document.createElement("span");
  s.textContent=c;
  s.style.transform=`rotate(${i*(360/text.length)}deg) translate(125px)`;
  inner.appendChild(s);
});

/* ORBIT */
const items=[...document.querySelectorAll(".orbit-item")];
const scene=document.getElementById("scene");

let radius;
let base=0;
let last=performance.now();

function resize(){
  radius=Math.min(scene.clientWidth,scene.clientHeight)*0.34;
}
resize();
window.addEventListener("resize",resize);

function animate(now){
  const dt=(now-last)/1000;
  last=now;

  const speed=(Math.PI*2)/60;
  base+=speed*dt;

  items.forEach((el,i)=>{
    const a=base+i*(Math.PI*2/items.length);
    el.style.transform=
      `translate(-50%,-50%) translate(${Math.cos(a)*radius}px,${Math.sin(a)*radius}px)`;
  });

  textAngle-=speed*dt*0.4*180/Math.PI;
  inner.style.transform=`rotate(${textAngle}deg)`;

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>

</body>
</html>
