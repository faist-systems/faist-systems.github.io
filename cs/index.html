<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>F.A.I.S.T. Holding</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f1117;
  --text:#ffffff;
  --muted:#b6bcc6;
  --panel:rgba(255,255,255,.05);
  --border:rgba(255,255,255,.12);

  --scene-size: clamp(420px, 70vmin, 820px);
  --logo-size: calc(var(--scene-size) * 0.25);
}

*{box-sizing:border-box}

html,body{
  margin:0;
  scrollbar-gutter:stable;
}

body{
  font-family:Inter,system-ui,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 20% 20%, #1b2035, var(--bg)),
    radial-gradient(circle at 80% 80%, #12162a, var(--bg));
}

/* ===== LANGUAGE SWITCH ===== */
.lang-switch{
  position:fixed;
  top:16px;
  right:16px;
  z-index:50;
}
.lang-switch img{width:22px}

/* ===== HERO ===== */
.hero{
  min-height:100vh;
  position:relative;
  display:grid;
  place-items:center;
}

/* ===== BRAND PANEL ===== */
.brand-panel{
  position:absolute;
  top:20px;
  left:20px;
  width:320px;
  padding:16px 18px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
}

/* ===== DESKTOP ORBIT ===== */
.scene{
  position:relative;
  width:var(--scene-size);
  height:var(--scene-size);
}
.center{
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  pointer-events:none;
}
.center img{width:var(--logo-size)}

.orbit, .inner-orbit{position:absolute; inset:0}

/* ===== MOBILE SHARED ===== */
.mobile{
  display:none;
  width:100%;
  height:100vh;
}

/* ===== PORTRAIT – VERTIKÁLNÍ NEKONEČNÝ PÁS ===== */
.mobile-vertical{
  display:none;
  overflow:hidden;
}

.vertical-track{
  height:100%;
  overflow-y:auto;
  scroll-snap-type:y mandatory;
  padding:100px 0;
}

.vertical-track::-webkit-scrollbar{display:none}

.vertical-card{
  height:70vh;
  margin:20px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:24px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  scroll-snap-align:center;
  text-align:center;
}

.vertical-card img{
  width:96px;
  margin-bottom:16px;
}
.vertical-card h3{
  margin:0 0 10px;
}
.vertical-card p{
  margin:0 0 18px;
  color:var(--muted);
}
.vertical-card a{
  padding:10px 18px;
  border-radius:999px;
  border:1px solid var(--border);
  color:#fff;
  text-decoration:none;
}

/* ===== LANDSCAPE – HORIZONTÁLNÍ CAROUSEL ===== */
.mobile-horizontal{
  display:none;
  padding-top:120px;
}

.horizontal-track{
  display:flex;
  gap:20px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  padding:0 20px;
}
.horizontal-track::-webkit-scrollbar{display:none}

.horizontal-card{
  flex:0 0 75%;
  max-width:360px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:24px;
  padding:28px;
  scroll-snap-align:center;
  text-align:center;
}

.horizontal-card img{
  width:96px;
  margin-bottom:14px;
}

/* ===== RESPONSIVE SWITCH ===== */
@media (max-width:900px){
  .scene{display:none}
  .brand-panel{
    position:static;
    margin:20px;
    width:auto;
  }
  .mobile{display:block}
}

@media (max-width:900px) and (orientation:portrait){
  .mobile-vertical{display:block}
}

@media (max-width:900px) and (orientation:landscape){
  .mobile-horizontal{display:block}
}
</style>
</head>

<body>

<div class="lang-switch">
  <a href="/en/index.html"><img src="/assets/flags/gb.png" alt="EN"></a>
</div>

<section class="hero">

  <div class="brand-panel">
    <h2>F.A.I.S.T. Holding</h2>
    <p style="color:var(--muted)">
      Navrhujeme inteligentní systémy propojující AI, vědu a technologie.
    </p>
  </div>

  <!-- DESKTOP -->
  <div class="scene">
    <div class="center">
      <img src="/assets/logos/faist-holding.png">
    </div>
  </div>

  <!-- MOBILE PORTRAIT -->
  <div class="mobile mobile-vertical">
    <div class="vertical-track" id="verticalTrack">
      <!-- cards injected by JS -->
    </div>
  </div>

  <!-- MOBILE LANDSCAPE -->
  <div class="mobile mobile-horizontal">
    <div class="horizontal-track">
      <div class="horizontal-card"><img src="/assets/logos/faist-systems.png"><h3>Systems</h3></div>
      <div class="horizontal-card"><img src="/assets/logos/faist-lab.png"><h3>Lab</h3></div>
      <div class="horizontal-card"><img src="/assets/logos/faist-digital.png"><h3>Digital</h3></div>
      <div class="horizontal-card"><img src="/assets/logos/faist-energy.png"><h3>Energy</h3></div>
      <div class="horizontal-card"><img src="/assets/logos/faist-security.png"><h3>Security</h3></div>
      <div class="horizontal-card"><img src="/assets/logos/faist-edu.png"><h3>Edu</h3></div>
    </div>
  </div>

</section>

<script>
/* ===== VERTIKÁLNÍ NEKONEČNÝ PÁS ===== */
const data = [
  {t:"Systems", d:"Firemní systémy", i:"faist-systems"},
  {t:"Lab", d:"Výzkum a prototypy", i:"faist-lab"},
  {t:"Digital", d:"Digitální produkty", i:"faist-digital"},
  {t:"Energy", d:"Energetická řešení", i:"faist-energy"},
  {t:"Security", d:"Bezpečnost", i:"faist-security"},
  {t:"Edu", d:"Vzdělávání", i:"faist-edu"},
];

const track = document.getElementById("verticalTrack");
[...data, ...data, ...data].forEach(item=>{
  const c=document.createElement("div");
  c.className="vertical-card";
  c.innerHTML=`
    <img src="/assets/logos/${item.i}.png">
    <h3>${item.t}</h3>
    <p>${item.d}</p>
    <a href="/cs/divisions/${item.t.toLowerCase()}.html">Vstoupit</a>
  `;
  track.appendChild(c);
});

track.scrollTop = track.scrollHeight/3;
track.addEventListener("scroll",()=>{
  const h = track.scrollHeight/3;
  if(track.scrollTop < h*0.5) track.scrollTop += h;
  if(track.scrollTop > h*1.5) track.scrollTop -= h;
});
</script>

</body>
</html>
