<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>F.A.I.S.T. Holding</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f1117;
  --text:#fff;
  --muted:#b6bcc6;
  --panel:rgba(255,255,255,.05);
  --border:rgba(255,255,255,.12);
  --angle:0deg;
}

*{box-sizing:border-box}
html,body{margin:0}

body{
  font-family:Inter,system-ui,sans-serif;
  background:
    radial-gradient(circle at 20% 20%, #1b2035, var(--bg)),
    radial-gradient(circle at 80% 80%, #12162a, var(--bg));
  color:var(--text);
}

/* HERO */
.hero{
  min-height:100vh;
  display:grid;
  place-items:center;
  position:relative;
}

/* PANEL */
.brand-panel{
  position:absolute;
  top:24px;
  left:24px;
  width:340px;
  padding:18px 20px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
}
.brand-panel h1{
  margin:0 0 10px;
  font-size:18px;
  letter-spacing:3px;
}
.brand-panel p{
  margin:0;
  font-size:14px;
  line-height:1.6;
  color:var(--muted);
}

/* SCENE */
.scene{
  position:relative;
  width:900px;
  height:900px;
  max-width:90vmin;
  max-height:90vmin;
  --r:min(38vmin,360px);
}

/* CENTER LOGO */
.center{
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  pointer-events:none;
  z-index:5;
}
.center img{width:220px}

/* ORBIT */
.orbit{
  position:absolute;
  inset:0;
  transform:rotate(var(--angle));
}

.orbit-item{
  position:absolute;
  top:50%;
  left:50%;
  transform:
    rotate(calc(var(--i)*360deg/6))
    translate(var(--r));
  pointer-events:none;
}

.orbit-logo{
  transform:rotate(var(--angle));
  pointer-events:auto;
  cursor:pointer;
}
.orbit-logo img{
  width:130px;
  display:block;
}

/* LABELS */
.labels-layer{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.orbit-label{
  position:absolute;
  top:50%;
  left:50%;
  transform:
    rotate(calc(var(--i)*360deg/6))
    rotate(var(--angle))
    translate(var(--r))
    translateY(90px)
    rotate(calc(-1 * var(--angle)));
  font-size:14px;
  letter-spacing:1px;
  white-space:nowrap;
}

/* TOOLTIP */
.orbit-label::after{
  content:attr(data-desc);
  position:absolute;
  top:-28px;
  left:50%;
  transform:translateX(-50%);
  background:#0a0c11;
  border:1px solid var(--border);
  padding:6px 8px;
  border-radius:6px;
  font-size:12px;
  color:var(--muted);
  opacity:0;
  transition:.2s;
}

.orbit-logo:hover + .orbit-label::after{
  opacity:1;
}

/* MOBILE */
@media(max-width:900px){
  .scene{display:none}
  .brand-panel{
    position:static;
    margin:20px;
    width:auto;
  }
}
</style>
</head>

<body>

<section class="hero">

  <div class="brand-panel">
    <h1>F.A.I.S.T. Holding</h1>
    <p>
      Navrhujeme inteligentní systémy propojující umělou inteligenci,
      vědu a moderní technologie do praktických a dlouhodobě
      udržitelných řešení.
    </p>
  </div>

  <div class="scene">

    <div class="center">
      <img src="/assets/logos/faist-holding.png">
    </div>

    <!-- LOGA -->
    <div class="orbit">
      <div class="orbit-item" style="--i:0">
        <div class="orbit-logo"><img src="/assets/logos/faist-systems.png"></div>
      </div>
      <div class="orbit-item" style="--i:1">
        <div class="orbit-logo"><img src="/assets/logos/faist-lab.png"></div>
      </div>
      <div class="orbit-item" style="--i:2">
        <div class="orbit-logo"><img src="/assets/logos/faist-digital.png"></div>
      </div>
      <div class="orbit-item" style="--i:3">
        <div class="orbit-logo"><img src="/assets/logos/faist-energy.png"></div>
      </div>
      <div class="orbit-item" style="--i:4">
        <div class="orbit-logo"><img src="/assets/logos/faist-security.png"></div>
      </div>
      <div class="orbit-item" style="--i:5">
        <div class="orbit-logo"><img src="/assets/logos/faist-edu.png"></div>
      </div>
    </div>

    <!-- TEXTY -->
    <div class="labels-layer">
      <div class="orbit-label" style="--i:0" data-desc="Firemní systémy">Systems</div>
      <div class="orbit-label" style="--i:1" data-desc="Výzkum a prototypy">Lab</div>
      <div class="orbit-label" style="--i:2" data-desc="Digitální produkty">Digital</div>
      <div class="orbit-label" style="--i:3" data-desc="Energetická řešení">Energy</div>
      <div class="orbit-label" style="--i:4" data-desc="Bezpečnost">Security</div>
      <div class="orbit-label" style="--i:5" data-desc="Vzdělávání">Edu</div>
    </div>

  </div>
</section>

<script>
let angle = 0;
setInterval(()=>{
  angle = (angle + 0.12) % 360;
  document.documentElement.style.setProperty('--angle', angle+'deg');
},16);
</script>

</body>
</html>
