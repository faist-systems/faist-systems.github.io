<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>F.A.I.S.T. Holding</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">

<style>
:root{
  --bg:#0c1020;
  --text:#e6e9f0;
  --muted:#9aa3b2;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,system-ui,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 50% 30%, #1a2040, var(--bg));
}

/* ===== LAYOUT ===== */
.page{
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

.hero{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

/* ===== CENTER ORBIT SYSTEM ===== */
.orbit{
  position:relative;
  width:520px;
  height:520px;
}

/* main logo */
.center-logo{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:3;
}

.center-logo img{
  width:160px;
}

/* rotating text ring */
.text-ring{
  position:absolute;
  inset:0;
  animation:spinCCW 30s linear infinite;
}

.text-ring svg{
  width:100%;
  height:100%;
}

.text-ring text{
  font-size:12px;
  letter-spacing:3px;
  fill:var(--muted);
}

/* divisions ring */
.divisions{
  position:absolute;
  inset:0;
  animation:spinCW 60s linear infinite;
}

.hero:hover .divisions,
.hero:hover .text-ring{
  animation-play-state:paused;
}

/* division item */
.division{
  position:absolute;
  width:96px;
  text-align:center;
  transform:translate(-50%,-50%);
}

.division img{
  width:64px;
  display:block;
  margin:0 auto 6px;
}

.division span{
  font-size:13px;
  color:var(--text);
}

/* positions (perfect circle) */
.d1{top:0%;left:50%}
.d2{top:25%;left:85%}
.d3{top:75%;left:85%}
.d4{top:100%;left:50%}
.d5{top:75%;left:15%}
.d6{top:25%;left:15%}

/* ===== FOOTER ===== */
footer{
  background:#070a14;
  border-top:1px solid rgba(255,255,255,.06);
  padding:48px 24px 32px;
  font-size:14px;
}

.footer-inner{
  max-width:1200px;
  margin:0 auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:40px;
}

footer h4{
  margin:0 0 12px;
  font-size:15px;
  color:#fff;
}

footer ul{
  list-style:none;
  padding:0;
  margin:0;
}

footer li{
  margin-bottom:8px;
}

footer a{
  color:var(--muted);
  text-decoration:none;
}

footer a:hover{
  color:#fff;
}

.footer-bottom{
  margin-top:32px;
  padding-top:16px;
  border-top:1px solid rgba(255,255,255,.06);
  text-align:center;
  color:#7f8896;
  font-size:13px;
}

/* ===== ANIMATIONS ===== */
@keyframes spinCW{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

@keyframes spinCCW{
  from{transform:rotate(360deg)}
  to{transform:rotate(0deg)}
}
</style>
</head>

<body>
<div class="page">

<section class="hero">

  <div class="orbit">

    <!-- rotating text -->
    <div class="text-ring">
      <svg viewBox="0 0 520 520">
        <defs>
          <path id="circlePath"
            d="M260,260 m-210,0 a210,210 0 1,1 420,0 a210,210 0 1,1 -420,0"/>
        </defs>
        <text>
          <textPath href="#circlePath">
            FORGE OF ARTIFICIAL INTELLIGENCE • SCIENCE & TECHNOLOGY •
          </textPath>
        </text>
      </svg>
    </div>

    <!-- center logo -->
    <div class="center-logo">
      <img src="/assets/logos/faist-holding.png" alt="F.A.I.S.T. Holding">
    </div>

    <!-- divisions -->
    <div class="divisions">

      <a class="division d1" href="/cs/divisions/lab.html">
        <img src="/assets/logos/faist-lab.png" alt="">
        <span>Lab</span>
      </a>

      <a class="division d2" href="/cs/divisions/digital.html">
        <img src="/assets/logos/faist-digital.png" alt="">
        <span>Digital</span>
      </a>

      <a class="division d3" href="/cs/divisions/energy.html">
        <img src="/assets/logos/faist-energy.png" alt="">
        <span>Energy</span>
      </a>

      <a class="division d4" href="/cs/divisions/edu.html">
        <img src="/assets/logos/faist-edu.png" alt="">
        <span>Edu</span>
      </a>

      <a class="division d5" href="/cs/divisions/systems.html">
        <img src="/assets/logos/faist-systems.png" alt="">
        <span>Systems</span>
      </a>

      <a class="division d6" href="/cs/divisions/security.html">
        <img src="/assets/logos/faist-security.png" alt="">
        <span>Security</span>
      </a>

    </div>
  </div>

</section>

<footer>
  <div class="footer-inner">

    <div>
      <h4>O nás</h4>
      <ul>
        <li>F.A.I.S.T. Holding</li>
        <li>Forge of Artificial Intelligence, Science & Technology</li>
      </ul>
    </div>

    <div>
      <h4>Divize</h4>
      <ul>
        <li><a href="/cs/divisions/systems.html">Systems</a></li>
        <li><a href="/cs/divisions/lab.html">Lab</a></li>
        <li><a href="/cs/divisions/digital.html">Digital</a></li>
        <li><a href="/cs/divisions/energy.html">Energy</a></li>
        <li><a href="/cs/divisions/security.html">Security</a></li>
        <li><a href="/cs/divisions/edu.html">Edu</a></li>
      </ul>
    </div>

    <div>
      <h4>Podpora</h4>
      <ul>
        <li><a href="/contacts.html">Kontakt</a></li>
      </ul>
    </div>

  </div>

  <div class="footer-bottom">
    © 2025 F.A.I.S.T. Holding
  </div>
</footer>

</div>
</body>
</html>
