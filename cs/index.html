<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>F.A.I.S.T. Holding</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f1117;
  --text:#ffffff;
  --muted:#b6bcc6;
}

*{box-sizing:border-box}
html,body{
  margin:0;
  height:100%;
}

body{
  font-family:Inter,system-ui,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 20% 20%, #1b2035, var(--bg)),
    radial-gradient(circle at 80% 80%, #12162a, var(--bg));
  overflow:hidden; /* ❗ žádný scroll */
}

/* ===== LANGUAGE ===== */
.lang-switch{
  position:fixed;
  top:20px;
  right:20px;
  z-index:20;
}
.lang-current{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);
  border-radius:8px;
  padding:6px;
  cursor:pointer;
}
.lang-current img{width:22px}
.lang-menu{
  position:absolute;
  top:42px;
  right:0;
  background:#0a0c11;
  border:1px solid rgba(255,255,255,.12);
  border-radius:10px;
  padding:8px;
  display:none;
}
.lang-menu a{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 10px;
  color:#e6e9ef;
  text-decoration:none;
  font-size:14px;
  border-radius:6px;
}
.lang-menu a:hover{background:rgba(255,255,255,.08)}
.lang-menu img{width:20px}

/* ===== HERO ===== */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* ===== LEFT INFO ===== */
.brand-info{
  position:absolute;
  top:28px;
  left:28px;
  max-width:360px;
}
.brand-info h1{
  margin:0 0 12px;
  font-size:20px;
  letter-spacing:3px;
}
.brand-info p{
  margin:0;
  font-size:14px;
  line-height:1.6;
  color:var(--muted);
}

/* ===== SCENE ===== */
.scene{
  position:relative;
  width:min(90vw, 90vh);
  height:min(90vw, 90vh);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ===== CENTER ===== */
.center{
  position:absolute;
  z-index:3;
}
.center img{
  width:210px;
  max-width:38vmin;
}

/* ===== INNER COIN ===== */
.inner-orbit{
  position:absolute;
  width:250px;
  height:250px;
  border-radius:50%;
  pointer-events:none;
}
.inner-orbit span{
  position:absolute;
  top:50%;
  left:50%;
  transform-origin:0 0;
  white-space:nowrap;
  font-size:14px;
  letter-spacing:2px;
  color:#eef2fa;
  text-shadow:0 0 10px rgba(255,255,255,.45);
}

/* ===== ORBIT ===== */
.orbit{position:absolute;inset:0}

.orbit-item{
  position:absolute;
  top:50%;
  left:50%;
  width:160px;
  text-align:center;
  text-decoration:none;
  color:var(--text);
}

.orbit-item img{
  width:140px;
  margin-bottom:2px;
  animation:spin 20s linear infinite;
}

.orbit-item .name{
  font-size:14px;
  letter-spacing:1px;
}

.orbit-item .desc{
  font-size:13px;
  color:var(--muted);
  margin-top:4px;
  opacity:0;
  transition:.25s ease;
}

.orbit-item:hover img{
  filter:drop-shadow(0 0 20px rgba(255,255,255,.6));
}
.orbit-item:hover .desc{opacity:1}

@keyframes spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}
</style>
</head>

<body>

<div class="lang-switch">
  <button class="lang-current">
    <img src="/assets/flags/cz.svg" alt="CZ">
  </button>
  <div class="lang-menu">
    <a href="/cs/"><img src="/assets/flags/cz.svg">Čeština</a>
    <a href="/en/"><img src="/assets/flags/en.svg">English</a>
  </div>
</div>

<section class="hero">

<div class="brand-info">
  <h1>F.A.I.S.T. Holding</h1>
  <p>Inteligentní systémy propojující umělou inteligenci, vědu a moderní technologie.</p>
</div>

<div class="scene">

  <div class="center">
    <img src="/assets/logos/faist-holding.png" alt="FAIST Holding">
  </div>

  <div class="inner-orbit" id="innerOrbit"></div>

  <div class="orbit" id="orbit">
    <a class="orbit-item" href="/cs/divisions/systems.html"><img src="/assets/logos/faist-systems.png"><div class="name">Systems</div><div class="desc">Chytré systémy.</div></a>
    <a class="orbit-item" href="/cs/divisions/lab.html"><img src="/assets/logos/faist-lab.png"><div class="name">Lab</div><div class="desc">Výzkum.</div></a>
    <a class="orbit-item" href="/cs/divisions/digital.html"><img src="/assets/logos/faist-digital.png"><div class="name">Digital</div><div class="desc">Digitální řešení.</div></a>
    <a class="orbit-item" href="/cs/divisions/energy.html"><img src="/assets/logos/faist-energy.png"><div class="name">Energy</div><div class="desc">Energetika.</div></a>
    <a class="orbit-item" href="/cs/divisions/security.html"><img src="/assets/logos/faist-security.png"><div class="name">Security</div><div class="desc">Bezpečnost.</div></a>
    <a class="orbit-item" href="/cs/divisions/edu.html"><img src="/assets/logos/faist-edu.png"><div class="name">Edu</div><div class="desc">Vzdělávání.</div></a>
  </div>

</div>
</section>

<script>
/* language */
const btn=document.querySelector(".lang-current");
const menu=document.querySelector(".lang-menu");
btn.onclick=()=>menu.style.display=menu.style.display==="block"?"none":"block";
document.addEventListener("click",e=>{
  if(!e.target.closest(".lang-switch"))menu.style.display="none";
});

/* inner coin */
const text="Forge of Artificial Intelligence, Science & Technology • ";
const inner=document.getElementById("innerOrbit");
const rText=125;
let aText=0;

text.split("").forEach((c,i)=>{
  const s=document.createElement("span");
  s.textContent=c;
  s.style.transform=`rotate(${i*(360/text.length)}deg) translate(${rText}px)`;
  inner.appendChild(s);
});

/* orbit */
const items=document.querySelectorAll(".orbit-item");
function animate(t){
  const base=(t/60000)*Math.PI*2;
  const radius=Math.min(innerWidth,innerHeight)*0.32;
  items.forEach((it,i)=>{
    const a=base+i*(Math.PI*2/items.length);
    it.style.transform=`translate(-50%,-50%) translate(${Math.cos(a)*radius}px,${Math.sin(a)*radius}px)`;
  });
  aText-=0.02;
  inner.style.transform=`rotate(${aText}deg)`;
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>

</body>
</html>
