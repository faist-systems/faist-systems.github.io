<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>F.A.I.S.T. Holding</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f1117;
  --text:#ffffff;
  --muted:#b6bcc6;
  --panel:rgba(255,255,255,.05);
  --border:rgba(255,255,255,.12);
}

*{box-sizing:border-box}
html,body{margin:0}

body{
  font-family:Inter,system-ui,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 20% 20%, #1b2035, var(--bg)),
    radial-gradient(circle at 80% 80%, #12162a, var(--bg));
}

/* LANGUAGE SWITCH */
.lang-switch{
  position:fixed;
  top:16px;
  right:16px;
  z-index:50;
}
.lang-switch img{width:22px}

/* HERO */
.hero{
  min-height:100vh;
  display:grid;
  place-items:center;
  position:relative;
}

/* LEFT PANEL */
.brand-panel{
  position:absolute;
  top:24px;
  left:24px;
  width:340px;
  padding:18px 20px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
}
.brand-panel h1{
  margin:0 0 10px;
  font-size:18px;
  letter-spacing:3px;
}
.brand-panel p{
  margin:0;
  font-size:14px;
  line-height:1.6;
  color:var(--muted);
}

/* ===== ORBIT SYSTEM ===== */
@keyframes orbit{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

.scene{
  position:relative;
  width:900px;
  height:900px;
  max-width:90vmin;
  max-height:90vmin;
}

.center{
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  z-index:3;
  pointer-events:none;
}
.center img{width:220px}

.orbit{
  position:absolute;
  inset:0;
  animation:orbit 60s linear infinite;
  transform-origin:50% 50%;
}

.scene:hover .orbit{
  animation-play-state:paused;
}

/* ORBIT ITEM */
.orbit-item{
  position:absolute;
  top:50%;
  left:50%;
  transform:
    rotate(calc(var(--i) * 360deg / 6))
    translate(min(38vmin, 360px));
  pointer-events:none; /* zabrání překlikům */
}

/* LOGO – rotuje */
.orbit-logo{
  pointer-events:auto;
  cursor:pointer;
}
.orbit-logo img{
  width:130px;
  display:block;
}

/* TEXT – drží orientaci */
.label{
  margin-top:6px;
  text-align:center;
  font-size:14px;
  letter-spacing:1px;
  color:#fff;
  transform:
    rotate(calc(var(--i) * -360deg / 6))
    rotate(-360deg);
}

/* TOOLTIP */
.orbit-item::after{
  content:attr(data-desc);
  position:absolute;
  bottom:115%;
  left:50%;
  transform:translateX(-50%) translateY(6px);
  background:#0a0c11;
  border:1px solid var(--border);
  border-radius:8px;
  padding:8px 10px;
  font-size:12px;
  color:var(--muted);
  white-space:nowrap;
  opacity:0;
  pointer-events:none;
  transition:.25s ease;
}
.orbit-logo:hover + .label,
.orbit-logo:hover ~ .label{
  color:#fff;
}
.orbit-logo:hover::after{
  opacity:1;
}

/* INNER TEXT ORBIT */
.inner-orbit{
  position:absolute;
  inset:0;
  pointer-events:none;
  animation:orbit 120s linear infinite reverse;
}
.inner-orbit span{
  position:absolute;
  top:50%;
  left:50%;
  transform-origin:0 0;
  font-size:13px;
  letter-spacing:2px;
  color:#e6ebf5;
  text-shadow:0 0 8px rgba(255,255,255,.35);
}

/* RESPONSIVE */
@media(max-width:900px){
  .scene{display:none}
  .brand-panel{
    position:static;
    margin:20px;
    width:auto;
  }
}
</style>
</head>

<body>

<div class="lang-switch">
  <a href="/en/index.html"><img src="/assets/flags/gb.png" alt="EN"></a>
</div>

<section class="hero">

  <div class="brand-panel">
    <h1>F.A.I.S.T. Holding</h1>
    <p>
      Navrhujeme inteligentní systémy propojující umělou inteligenci,
      vědu a moderní technologie do praktických a dlouhodobě
      udržitelných řešení.
    </p>
  </div>

  <div class="scene">

    <div class="center">
      <img src="/assets/logos/faist-holding.png" alt="FAIST Holding">
    </div>

    <div class="inner-orbit" id="innerOrbit"></div>

    <div class="orbit">
      <a class="orbit-item" style="--i:0" data-desc="Firemní systémy" href="/cs/divisions/systems.html">
        <div class="orbit-logo"><img src="/assets/logos/faist-systems.png"></div>
        <div class="label">Systems</div>
      </a>
      <a class="orbit-item" style="--i:1" data-desc="Výzkum a prototypy" href="/cs/divisions/lab.html">
        <div class="orbit-logo"><img src="/assets/logos/faist-lab.png"></div>
        <div class="label">Lab</div>
      </a>
      <a class="orbit-item" style="--i:2" data-desc="Digitální produkty" href="/cs/divisions/digital.html">
        <div class="orbit-logo"><img src="/assets/logos/faist-digital.png"></div>
        <div class="label">Digital</div>
      </a>
      <a class="orbit-item" style="--i:3" data-desc="Energetická řešení" href="/cs/divisions/energy.html">
        <div class="orbit-logo"><img src="/assets/logos/faist-energy.png"></div>
        <div class="label">Energy</div>
      </a>
      <a class="orbit-item" style="--i:4" data-desc="Bezpečnost" href="/cs/divisions/security.html">
        <div class="orbit-logo"><img src="/assets/logos/faist-security.png"></div>
        <div class="label">Security</div>
      </a>
      <a class="orbit-item" style="--i:5" data-desc="Vzdělávání" href="/cs/divisions/edu.html">
        <div class="orbit-logo"><img src="/assets/logos/faist-edu.png"></div>
        <div class="label">Edu</div>
      </a>
    </div>

  </div>
</section>

<script>
/* INNER TEXT GENERATION */
const inner=document.getElementById("innerOrbit");
const text="Forge of Artificial Intelligence, Science & Technology • ";
const r=125;

text.split("").forEach((c,i)=>{
  const s=document.createElement("span");
  s.textContent=c;
  s.style.transform=
    `rotate(${i*(360/text.length)}deg) translate(${r}px)`;
  inner.appendChild(s);
});
</script>

</body>
</html>
