<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>F.A.I.S.T. Holding</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f1117;
  --text:#ffffff;
  --muted:#b6bcc6;
  --panel:rgba(255,255,255,.05);
  --border:rgba(255,255,255,.12);
  --glow1:rgba(255,200,80,.45);
  --glow2:rgba(120,160,255,.25);
}

*{box-sizing:border-box}
html,body{margin:0;height:100%}

body{
  font-family:Inter,system-ui,sans-serif;
  color:var(--text);
  background:#0f1117;
  overflow-x:hidden;
}

/* 🌌 LIVING BACKGROUND */
body::before,
body::after{
  content:"";
  position:fixed;
  inset:-20%;
  z-index:-1;
  background:
    radial-gradient(circle at var(--x1,30%) var(--y1,30%), var(--glow1), transparent 60%),
    radial-gradient(circle at var(--x2,70%) var(--y2,70%), var(--glow2), transparent 65%);
  animation: drift 90s linear infinite;
}

body::after{
  animation-duration:140s;
  opacity:.6;
}

@keyframes drift{
  0%{transform:translate(0,0)}
  50%{transform:translate(-4%,3%)}
  100%{transform:translate(0,0)}
}

/* LANGUAGE */
.lang-switch{
  position:fixed;
  top:16px;
  right:16px;
  z-index:50;
}
.lang-switch img{width:22px}

/* HERO */
.hero{
  min-height:100vh;
  display:grid;
  place-items:center;
  position:relative;
}

/* LEFT PANEL */
.brand-panel{
  position:absolute;
  top:24px;
  left:24px;
  width:340px;
  padding:18px 20px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  z-index:20;
}

/* SCENE */
.scene{
  position:relative;
  width:900px;
  height:900px;
  max-width:90vmin;
  max-height:90vmin;
}

/* CENTER */
.center{
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  z-index:5;
  pointer-events:none;
}

.center-inner{
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
  pointer-events:auto;
}

.center-inner img{
  width:220px;
  transition:.3s ease;
}

.center-inner:hover img{
  filter:
    drop-shadow(0 0 18px rgba(255,200,80,.6))
    drop-shadow(0 0 36px rgba(255,160,40,.4));
  transform:scale(1.04);
}

.ask-me{
  margin-top:6px;
  font-size:12px;
  color:var(--muted);
}

/* ORBIT */
.orbit{
  position:absolute;
  inset:0;
}

.orbit-item{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  color:white;
  text-decoration:none;
}

.orbit-item img{
  width:130px;
  margin-bottom:6px;
  animation:spin 20s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0)}
  to{transform:rotate(360deg)}
}

/* AI PANEL */
#aiPanel{
  position:fixed;
  inset:0;
  background:rgba(10,12,17,.9);
  backdrop-filter:blur(6px);
  display:none;
  z-index:100;
  padding:32px;
}

#aiBox{
  max-width:720px;
  margin:auto;
  background:#0f1117;
  border:1px solid var(--border);
  border-radius:16px;
  padding:24px;
}

.ai-buttons{
  margin-top:24px;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.ai-buttons button{
  background:#1b2035;
  color:white;
  border:1px solid var(--border);
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
}

/* FOOTER */
.site-footer{
  background:#0a0c11;
  border-top:1px solid rgba(255,255,255,.08);
  padding:48px 24px;
}
</style>
</head>

<body>

<div class="lang-switch">
  <a href="/en/index.html"><img src="/assets/flags/gb.png"></a>
</div>

<section class="hero">
  <div class="brand-panel">
    <h1>F.A.I.S.T. Holding</h1>
    <p style="color:var(--muted)">
      Inteligentní systémy, výzkum a technologie.
    </p>
  </div>

  <div class="scene" id="scene">

    <div class="center">
      <div class="center-inner" id="centerClick">
        <img src="/assets/logos/faist-holding.png" alt="FAIST">
        <div class="ask-me">Zeptej se mě</div>
      </div>
    </div>

    <div class="orbit">
      <a class="orbit-item" href="/cs/divisions/systems.html"><img src="/assets/logos/faist-systems.png"><div>Systems</div></a>
      <a class="orbit-item" href="/cs/divisions/lab.html"><img src="/assets/logos/faist-lab.png"><div>Lab</div></a>
      <a class="orbit-item" href="/cs/divisions/digital.html"><img src="/assets/logos/faist-digital.png"><div>Digital</div></a>
      <a class="orbit-item" href="/cs/divisions/energy.html"><img src="/assets/logos/faist-energy.png"><div>Energy</div></a>
      <a class="orbit-item" href="/cs/divisions/security.html"><img src="/assets/logos/faist-security.png"><div>Security</div></a>
      <a class="orbit-item" href="/cs/divisions/edu.html"><img src="/assets/logos/faist-edu.png"><div>Edu</div></a>
    </div>

  </div>
</section>

<footer class="site-footer">
  © 2026 F.A.I.S.T. Holding
</footer>

<div id="aiPanel">
  <div id="aiBox">
    <h2>FAIST AI</h2>
    <div id="aiContent" style="color:var(--muted)"></div>
    <div class="ai-buttons">
      <button data-q="Co je FAIST?">Co je FAIST?</button>
      <button data-q="Divize">Divize</button>
      <button data-q="Zavřít">Zavřít</button>
    </div>
  </div>
</div>

<script>
/* BACKGROUND PARALLAX */
document.addEventListener("mousemove",e=>{
  const x=e.clientX/window.innerWidth*100;
  const y=e.clientY/window.innerHeight*100;
  document.body.style.setProperty("--x1",`${x}%`);
  document.body.style.setProperty("--y1",`${y}%`);
  document.body.style.setProperty("--x2",`${100-x}%`);
  document.body.style.setProperty("--y2",`${100-y}%`);
});

/* AI */
const aiPanel=document.getElementById("aiPanel");
const aiContent=document.getElementById("aiContent");
const answers={
  "Co je FAIST?":"FAIST je technologický holding zaměřený na inteligentní systémy.",
  "Divize":"Systems, Lab, Digital, Energy, Security a Edu."
};

document.getElementById("centerClick").onclick=()=>{
  aiPanel.style.display="block";
  aiContent.innerHTML=answers["Co je FAIST?"];
};

aiPanel.onclick=e=>{
  if(e.target.dataset.q){
    if(e.target.dataset.q==="Zavřít") aiPanel.style.display="none";
    else aiContent.innerHTML=answers[e.target.dataset.q];
  }
};
</script>

</body>
</html>
