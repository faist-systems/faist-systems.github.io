<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>F.A.I.S.T. Holding</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f1117;
  --text:#ffffff;
  --muted:#b6bcc6;
  --panel:rgba(255,255,255,.04);
  --border:rgba(255,255,255,.12);
  --gold1:rgba(255,200,80,.6);
  --gold2:rgba(255,160,40,.4);
}

*{box-sizing:border-box}
html,body{margin:0}

body{
  font-family:Inter,system-ui,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 20% 20%, #1b2035, var(--bg)),
    radial-gradient(circle at 80% 80%, #12162a, var(--bg));
}

/* LANGUAGE SWITCH */
.lang-switch{
  position:fixed;
  top:20px;
  right:20px;
  z-index:50;
}
.lang-switch img{width:22px}

/* HERO */
.hero{
  min-height:100vh;
  display:grid;
  place-items:center;
  position:relative;
  overflow:hidden;
}

/* LEFT PANEL */
.brand-panel{
  position:absolute;
  top:32px;
  left:32px;
  width:360px;
  padding:20px 22px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  z-index:20;
}

/* SCENE */
.scene{
  position:relative;
  width:900px;
  height:900px;
  max-width:90vmin;
  max-height:90vmin;
}

/* CENTER STACK */
.center-stack{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  z-index:3;
}

/* MAIN LOGO */
.center-stack img{
  width:220px;
  transition:filter .3s ease, transform .3s ease;
  cursor:pointer;
}
.center-stack img.ai-glow{
  filter:
    drop-shadow(0 0 16px var(--gold1))
    drop-shadow(0 0 36px var(--gold2));
  transform:scale(1.04);
}

/* ASK ME */
.ask-me{
  margin-top:6px;              /* 🔧 POSUN VÝŠ */
  font-size:12px;
  color:var(--muted);
  cursor:pointer;
}
.ask-me:hover{
  text-shadow:0 0 10px var(--gold1);
}

/* INNER TEXT */
.inner-orbit{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:1;
}
.inner-orbit span{
  position:absolute;
  top:50%;
  left:50%;
  transform-origin:0 0;
  white-space:nowrap;
  font-size:12px;
  letter-spacing:1.4px;
  color:#e6ebf5;
}

/* ORBIT */
.orbit{
  position:absolute;
  inset:0;
  z-index:2;
}

.orbit-item{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  color:#fff;
  text-decoration:none;
}

.orbit-item img{
  width:130px;
  margin:0 auto 6px;
  display:block;
  animation:spin 20s linear infinite;
}

.orbit-item .label{
  font-size:14px;
  color:#fff;
  text-decoration:none;
}

.orbit-item::after{
  content:attr(data-desc);
  position:absolute;
  bottom:115%;
  left:50%;
  transform:translateX(-50%) translateY(6px);
  background:#0a0c11;
  border:1px solid var(--border);
  border-radius:8px;
  padding:8px 10px;
  font-size:12px;
  color:var(--muted);
  white-space:nowrap;
  opacity:0;
  pointer-events:none;
  transition:.25s ease;
}

.orbit-item:hover::after{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

@keyframes spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

/* AI MODAL */
.ai-modal{
  position:fixed;
  inset:0;
  background:rgba(10,12,17,.75);
  display:none;
  place-items:center;
  z-index:100;
}
.ai-modal.open{display:grid}

.ai-box{
  background:#0a0c11;
  border:1px solid var(--border);
  border-radius:14px;
  padding:26px 30px;
  max-width:420px;
  text-align:center;
}
.ai-box button{
  margin-top:18px;
  background:none;
  border:1px solid var(--border);
  color:#fff;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}

/* FOOTER */
.site-footer{
  background:#0a0c11;
  border-top:1px solid rgba(255,255,255,.08);
  padding:48px 24px;
}
</style>
</head>

<body>

<div class="lang-switch">
  <a href="/en/index.html"><img src="/assets/flags/gb.png"></a>
</div>

<section class="hero">

  <div class="brand-panel">
    <h1>F.A.I.S.T. Holding</h1>
    <p style="color:var(--muted)">
      Navrhujeme inteligentní systémy propojující umělou inteligenci,
      vědu a moderní technologie.
    </p>
  </div>

  <div class="scene" id="scene">

    <div class="center-stack">
      <img id="mainLogo" src="/assets/logos/faist-holding.png" alt="FAIST">
      <div class="ask-me" id="askAI">Zeptej se mě</div>
    </div>

    <div class="inner-orbit" id="innerOrbit"></div>

    <div class="orbit">
      <a class="orbit-item" href="/cs/divisions/systems.html" data-desc="Firemní systémy"><img src="/assets/logos/faist-systems.png"><div class="label">Systems</div></a>
      <a class="orbit-item" href="/cs/divisions/lab.html" data-desc="Výzkum a prototypy"><img src="/assets/logos/faist-lab.png"><div class="label">Lab</div></a>
      <a class="orbit-item" href="/cs/divisions/digital.html" data-desc="Digitální produkty"><img src="/assets/logos/faist-digital.png"><div class="label">Digital</div></a>
      <a class="orbit-item" href="/cs/divisions/energy.html" data-desc="Energetická řešení"><img src="/assets/logos/faist-energy.png"><div class="label">Energy</div></a>
      <a class="orbit-item" href="/cs/divisions/security.html" data-desc="Bezpečnost"><img src="/assets/logos/faist-security.png"><div class="label">Security</div></a>
      <a class="orbit-item" href="/cs/divisions/edu.html" data-desc="Vzdělávání"><img src="/assets/logos/faist-edu.png"><div class="label">Edu</div></a>
    </div>

  </div>
</section>

<footer class="site-footer"></footer>

<div class="ai-modal" id="aiModal">
  <div class="ai-box">
    <h3>FAIST AI</h3>
    <p>Tady bude AI rozhraní.</p>
    <button id="closeAI">Zavřít</button>
  </div>
</div>

<script>
/* SCROLL FIX */
if ('scrollRestoration' in history) history.scrollRestoration='manual';
window.addEventListener('load',()=>window.scrollTo(0,0));

/* AI */
const logo=document.getElementById('mainLogo');
const ask=document.getElementById('askAI');
const modal=document.getElementById('aiModal');

[logo,ask].forEach(el=>{
  el.addEventListener('mouseenter',()=>logo.classList.add('ai-glow'));
  el.addEventListener('mouseleave',()=>logo.classList.remove('ai-glow'));
  el.addEventListener('click',()=>modal.classList.add('open'));
});

modal.addEventListener('click',e=>{
  if(e.target===modal) modal.classList.remove('open');
});
document.getElementById('closeAI').onclick=()=>modal.classList.remove('open');

/* INNER TEXT */
const text="Forge of Artificial Intelligence · Science · Technology · ";
const inner=document.getElementById("innerOrbit");
let textAngle=0;
const textRadius=135;

text.split("").forEach((c,i)=>{
  const s=document.createElement("span");
  s.textContent=c;
  s.style.transform=`rotate(${i*(360/text.length)}deg) translate(${textRadius}px)`;
  inner.appendChild(s);
});

/* ORBIT */
const items=[...document.querySelectorAll(".orbit-item")];
const scene=document.getElementById("scene");
let radius,base=0,last=performance.now(),frozen=false;

items.forEach(el=>{
  el.addEventListener("mouseenter",()=>frozen=true);
  el.addEventListener("mouseleave",()=>{frozen=false;last=performance.now();});
});

function resize(){
  radius=Math.min(scene.clientWidth,scene.clientHeight)*0.34;
}
resize();
window.addEventListener("resize",resize);

function animate(now){
  const dt=(now-last)/1000;
  last=now;

  if(!frozen){
    const speed=(Math.PI*2)/60;
    base+=speed*dt;
    textAngle-=speed*dt*0.35*180/Math.PI;
  }

  items.forEach((el,i)=>{
    const a=base+i*(Math.PI*2/items.length);
    el.style.transform=`translate(-50%,-50%) translate(${Math.cos(a)*radius}px,${Math.sin(a)*radius}px)`;
  });

  inner.style.transform=`rotate(${textAngle}deg)`;
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>

</body>
</html>
