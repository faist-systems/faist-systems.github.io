<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>F.A.I.S.T. Holding</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0c1020;
  --text:#e6e9f0;
  --muted:#9aa3b2;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,system-ui,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 50% 30%, #1a2040, var(--bg));
}

/* ===== LAYOUT ===== */
.page{
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

.hero{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

/* ===== ORBIT SYSTEM ===== */
.orbit{
  position:relative;
  width:560px;
  height:560px;
}

.center-logo{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:3;
}

.center-logo img{
  width:180px;
}

/* inner text ring */
.text-ring{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.text-ring svg{
  width:100%;
  height:100%;
}

.text-ring text{
  font-size:12px;
  letter-spacing:3px;
  fill:var(--muted);
}

/* outer orbit items */
.divisions{
  position:absolute;
  inset:0;
}

.division{
  position:absolute;
  top:50%;
  left:50%;
  width:110px;
  text-align:center;
  transform-origin:0 0;
  cursor:pointer;
}

.division img{
  width:72px;
  display:block;
  margin:0 auto 6px;
}

.division span{
  font-size:13px;
  color:var(--text);
}

/* ===== FOOTER ===== */
footer{
  background:#070a14;
  border-top:1px solid rgba(255,255,255,.06);
  padding:48px 24px 32px;
}

.footer-inner{
  max-width:1200px;
  margin:0 auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:40px;
}

footer h4{
  margin:0 0 12px;
  font-size:15px;
  color:#fff;
}

footer ul{
  list-style:none;
  padding:0;
  margin:0;
}

footer li{
  margin-bottom:8px;
}

footer a{
  color:var(--muted);
  text-decoration:none;
}

footer a:hover{
  color:#fff;
}

.footer-bottom{
  margin-top:32px;
  padding-top:16px;
  border-top:1px solid rgba(255,255,255,.06);
  text-align:center;
  color:#7f8896;
  font-size:13px;
}
</style>
</head>

<body>
<div class="page">

<section class="hero">

  <div class="orbit" id="orbit">

    <!-- INNER TEXT RING -->
    <div class="text-ring" id="textRing">
      <svg viewBox="0 0 560 560">
        <defs>
          <path id="circlePath"
            d="M280,280 m-220,0 a220,220 0 1,1 440,0 a220,220 0 1,1 -440,0"/>
        </defs>
        <text>
          <textPath href="#circlePath">
            FORGE OF ARTIFICIAL INTELLIGENCE • SCIENCE & TECHNOLOGY •
          </textPath>
        </text>
      </svg>
    </div>

    <!-- CENTER LOGO -->
    <div class="center-logo">
      <img src="/assets/logos/faist-holding.png" alt="F.A.I.S.T. Holding">
    </div>

    <!-- DIVISIONS -->
    <div class="divisions" id="divisions">
      <a class="division" href="/cs/divisions/lab.html">
        <img src="/assets/logos/faist-lab.png"><span>Lab</span>
      </a>
      <a class="division" href="/cs/divisions/digital.html">
        <img src="/assets/logos/faist-digital.png"><span>Digital</span>
      </a>
      <a class="division" href="/cs/divisions/energy.html">
        <img src="/assets/logos/faist-energy.png"><span>Energy</span>
      </a>
      <a class="division" href="/cs/divisions/edu.html">
        <img src="/assets/logos/faist-edu.png"><span>Edu</span>
      </a>
      <a class="division" href="/cs/divisions/systems.html">
        <img src="/assets/logos/faist-systems.png"><span>Systems</span>
      </a>
      <a class="division" href="/cs/divisions/security.html">
        <img src="/assets/logos/faist-security.png"><span>Security</span>
      </a>
    </div>

  </div>
</section>

<footer>
  <div class="footer-inner">
    <div>
      <h4>O nás</h4>
      <ul>
        <li>F.A.I.S.T. Holding</li>
        <li>Forge of Artificial Intelligence, Science & Technology</li>
      </ul>
    </div>
    <div>
      <h4>Divize</h4>
      <ul>
        <li><a href="/cs/divisions/systems.html">Systems</a></li>
        <li><a href="/cs/divisions/lab.html">Lab</a></li>
        <li><a href="/cs/divisions/digital.html">Digital</a></li>
        <li><a href="/cs/divisions/energy.html">Energy</a></li>
        <li><a href="/cs/divisions/security.html">Security</a></li>
        <li><a href="/cs/divisions/edu.html">Edu</a></li>
      </ul>
    </div>
  </div>
  <div class="footer-bottom">© 2025 F.A.I.S.T. Holding</div>
</footer>

</div>

<script>
/*
  =====================================================
  FA.I.S.T. ORBIT ENGINE – JS ONLY
  =====================================================
*/

const orbit = document.getElementById("orbit");
const divisions = [...document.querySelectorAll(".division")];
const textRing = document.getElementById("textRing");

const ORBIT_RADIUS = 240;           // px
const ORBIT_PERIOD = 60000;         // 60 s
const TEXT_SPEED = -0.5;            // opposite direction
let paused = false;

/* pause on hover */
orbit.addEventListener("mouseenter", () => paused = true);
orbit.addEventListener("mouseleave", () => paused = false);

function animate(time){
  if(!paused){
    const angleBase = (time % ORBIT_PERIOD) / ORBIT_PERIOD * Math.PI * 2;

    divisions.forEach((el, i) => {
      const angle = angleBase + i * (Math.PI * 2 / divisions.length);

      const x = Math.cos(angle) * ORBIT_RADIUS;
      const y = Math.sin(angle) * ORBIT_RADIUS;

      el.style.transform =
        `translate(-50%,-50%) translate(${x}px,${y}px) rotate(${-angle}rad)`;
    });

    textRing.style.transform =
      `rotate(${angleBase * TEXT_SPEED}rad)`;
  }

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>

</body>
</html>
