<!DOCTYPE html>
<html lang="cs">
<head>
  <!-- Základní kódování znaků -->
  <meta charset="utf-8">

  <!-- Responsivní chování na mobilech -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Titulek stránky -->
  <title>F.A.I.S.T. Holding</title>

  <!-- Optimalizace načítání Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Font Inter – moderní, čitelný -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    /* =========================
       DESIGNOVÉ PROMĚNNÉ
       (jedno místo, kde ladíš celý web)
    ========================= */
    :root{
      --bg-main:#0f1117;                  /* Hlavní tmavé pozadí */
      --bg-soft:rgba(255,255,255,0.08);   /* Skleněné karty */
      --border-soft:rgba(255,255,255,0.15);
      --text-main:#ffffff;
      --text-muted:#a8b0bd;

      --orbit-radius:320px;               /* Vzdálenost karet od středu */
      --card-size:180px;                  /* Velikost čtvercových karet */
    }

    /* =========================
       RESET ZÁKLADŮ
    ========================= */
    *{
      box-sizing:border-box;              /* Šířka = obsah + padding + border */
    }

    body{
      margin:0;
      min-height:100vh;
      font-family:Inter,system-ui,sans-serif;
      color:var(--text-main);

      /* Jemné futuristické pozadí */
      background:
        radial-gradient(circle at 20% 20%, #1b2035, var(--bg-main)),
        radial-gradient(circle at 80% 80%, #12162a, var(--bg-main));
    }

    a{
      text-decoration:none;               /* Žádné podtržení */
      color:inherit;                      /* Barvu dědí z rodiče */
    }

    /* =========================
       HERO SEKCE
    ========================= */
    .hero{
      min-height:100vh;                   /* Na výšku celé obrazovky */
      display:flex;
      align-items:center;                 /* Vertikální centrování */
      justify-content:center;             /* Horizontální centrování */
      padding:64px 24px;
    }

    /* =========================
       ORBITÁLNÍ KONTEJNER
    ========================= */
    .orbit{
      position:relative;                  /* Referenční bod pro absolutní děti */
      width:min(90vmin,900px);
      height:min(90vmin,900px);
    }

    /* =========================
       STŘED – LOGO + NÁZEV
    ========================= */
    .center{
      position:absolute;
      inset:0;                            /* Vyplní celý orbit */
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      z-index:5;                          /* Nad kartami */
    }

    .center img{
      width:240px;
      margin-bottom:16px;
    }

    .center h1{
      margin:0;
      letter-spacing:3px;
      font-size:22px;
    }

    /* =========================
       ROTUJÍCÍ VRSTVA (POZICE)
    ========================= */
    .orbit-rotator{
      position:absolute;
      inset:0;

      /* 25 % zpomalení → 80s → 100s */
      animation:spin 100s linear infinite;

      /* Uloží aktuální úhel do proměnné */
      --spin-angle:0deg;
    }

    /* =========================
       KARTY (POZICE NA ORBITĚ)
    ========================= */
    .card{
      position:absolute;

      width:var(--card-size);
      height:var(--card-size);

      top:50%;
      left:50%;

      /* Skleněný efekt */
      background:var(--bg-soft);
      border:1px solid var(--border-soft);
      border-radius:24px;

      /* Přesun do středu + orbitální posun */
      transform-origin:center;
    }

    /* =========================
       MATEMATICKÁ SYMETRIE
       (6 prvků po 60°)
    ========================= */
    .p1{transform:rotate(0deg)   translateY(calc(-1 * var(--orbit-radius)));}
    .p2{transform:rotate(60deg)  translateY(calc(-1 * var(--orbit-radius)));}
    .p3{transform:rotate(120deg) translateY(calc(-1 * var(--orbit-radius)));}
    .p4{transform:rotate(180deg) translateY(calc(-1 * var(--orbit-radius)));}
    .p5{transform:rotate(240deg) translateY(calc(-1 * var(--orbit-radius)));}
    .p6{transform:rotate(300deg) translateY(calc(-1 * var(--orbit-radius)));}

    /* =========================
       VNITŘEK KARTY
       (PROTIROTACE OBSAHU)
    ========================= */
    .card-inner{
      width:100%;
      height:100%;

      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;

      /* KLÍČOVÝ TRIK:
         obsah se otáčí OPAČNĚ než orbit */
      transform:rotate(calc(var(--spin-angle) * -1));
    }

    .card-inner img{
      width:72px;
      margin-bottom:10px;
    }

    .card-inner strong{
      font-size:14px;
      letter-spacing:1px;
    }

    .card-inner span{
      margin-top:4px;
      font-size:13px;
      color:var(--text-muted);
    }

    /* =========================
       ANIMACE ROTACE
    ========================= */
    @keyframes spin{
      from{
        transform:rotate(0deg);
        --spin-angle:0deg;
      }
      to{
        transform:rotate(360deg);
        --spin-angle:360deg;
      }
    }

    /* =========================
       MOBIL – BEZ ROTACE
    ========================= */
    @media (max-width:900px){
      .orbit-rotator{
        animation:none;                   /* Žádná rotace na mobilu */
      }

      .card{
        position:static;
        margin:16px auto;
        transform:none;
      }
    }
  </style>
</head>

<body>

<section class="hero">

  <div class="orbit">

    <!-- STŘED -->
    <div class="center">
      <img src="assets/logos/faist-holding.png" alt="F.A.I.S.T. Holding">
      <h1>F.A.I.S.T. HOLDING</h1>
    </div>

    <!-- ORBIT -->
    <div class="orbit-rotator">

      <a href="systems.html" class="card p1">
        <div class="card-inner">
          <img src="assets/logos/faist-systems.png">
          <strong>Systems</strong>
          <span>Smart systems & IoT</span>
        </div>
      </a>

      <a href="lab.html" class="card p2">
        <div class="card-inner">
          <img src="assets/logos/faist-lab.png">
          <strong>Lab</strong>
          <span>AI research</span>
        </div>
      </a>

      <a href="digital.html" class="card p3">
        <div class="card-inner">
          <img src="assets/logos/faist-digital.png">
          <strong>Digital</strong>
          <span>Digital products</span>
        </div>
      </a>

      <a href="energy.html" class="card p4">
        <div class="card-inner">
          <img src="assets/logos/faist-energy.png">
          <strong>Energy</strong>
          <span>Energy systems</span>
        </div>
      </a>

      <a href="security.html" class="card p5">
        <div class="card-inner">
          <img src="assets/logos/faist-security.png">
          <strong>Security</strong>
          <span>Security tech</span>
        </div>
      </a>

      <a href="edu.html" class="card p6">
        <div class="card-inner">
          <img src="assets/logos/faist-edu.png">
          <strong>Edu</strong>
          <span>Education</span>
        </div>
      </a>

    </div>
  </div>

</section>

</body>
</html>
