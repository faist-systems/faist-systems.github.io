<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>F.A.I.S.T. Holding</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap">

<style>
:root{
  --bg-main:#0f1117;
  --bg-soft:rgba(255,255,255,0.07);
  --border-soft:rgba(255,255,255,0.14);
  --text-main:#ffffff;
  --text-muted:#a8b0bd;
}

/* RESET */
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,system-ui,sans-serif;
  color:var(--text-main);
  background:
    radial-gradient(circle at 20% 20%, #1b2035, var(--bg-main)),
    radial-gradient(circle at 80% 80%, #12162a, var(--bg-main));
}
a{text-decoration:none;color:inherit}

/* =========================
   HERO / HEX ORBIT
========================= */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:80px 24px;
}

/* HEX CONTAINER */
.hex-container{
  position:relative;
  width:900px;
  height:900px;
}

/* CENTER */
.hex-center{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  z-index:2;
}
.hex-center img{
  width:280px;
  margin-bottom:18px;
}
.hex-center h1{
  margin:0;
  font-size:22px;
  letter-spacing:3px;
}

/* HEX RING */
.hex-ring{
  position:absolute;
  inset:0;
  animation:spin 90s linear infinite;
}
.hex-ring:hover{
  animation-play-state:paused;
}

/* HEX ITEM */
.hex-item{
  position:absolute;
  width:220px;
  height:160px;
  padding:22px;
  background:var(--bg-soft);
  border:1px solid var(--border-soft);
  border-radius:22px;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;

  transform:translate(-50%,-50%);
  animation:counter-spin 90s linear infinite;
  transition:
    transform .35s ease,
    box-shadow .35s ease,
    background .35s ease;
}
.hex-ring:hover .hex-item{
  animation-play-state:paused;
}

.hex-item img{
  width:120px;
  margin-bottom:10px;
}

.hex-item strong{
  font-size:14px;
  letter-spacing:1px;
}

/* HOVER */
.hex-item:hover{
  transform:translate(-50%,-50%) scale(1.18);
  background:rgba(255,255,255,0.12);
  box-shadow:0 28px 70px rgba(0,0,0,0.7);
  z-index:5;
}

/* POSITIONS – REGULAR HEX */
.h1{top:0%;   left:50%;}
.h2{top:25%;  left:85%;}
.h3{top:75%;  left:85%;}
.h4{top:100%; left:50%;}
.h5{top:75%;  left:15%;}
.h6{top:25%;  left:15%;}

/* ANIMATIONS */
@keyframes spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}
@keyframes counter-spin{
  from{transform:rotate(360deg)}
  to{transform:rotate(0deg)}
}

/* =========================
   MOBILE
========================= */
@media (max-width:900px){
  .hex-ring,
  .hex-item{
    animation:none;
  }
  .hex-container{
    width:100%;
    height:auto;
  }
  .hex-item{
    position:static;
    transform:none;
    margin:20px auto;
  }
}
</style>
</head>

<body>

<section class="hero">
  <div class="hex-container">

    <!-- CENTER -->
    <div class="hex-center">
      <img src="assets/logos/faist-holding.png" alt="F.A.I.S.T. Holding">
      <h1>F.A.I.S.T. HOLDING</h1>
    </div>

    <!-- HEX RING -->
    <div class="hex-ring">

      <a href="systems.html" class="hex-item h1">
        <img src="assets/logos/faist-systems.png" alt="">
        <strong>Systems</strong>
      </a>

      <a href="lab.html" class="hex-item h2">
        <img src="assets/logos/faist-lab.png" alt="">
        <strong>Lab</strong>
      </a>

      <a href="digital.html" class="hex-item h3">
        <img src="assets/logos/faist-digital.png" alt="">
        <strong>Digital</strong>
      </a>

      <a href="energy.html" class="hex-item h4">
        <img src="assets/logos/faist-energy.png" alt="">
        <strong>Energy</strong>
      </a>

      <a href="security.html" class="hex-item h5">
        <img src="assets/logos/faist-security.png" alt="">
        <strong>Security</strong>
      </a>

      <a href="edu.html" class="hex-item h6">
        <img src="assets/logos/faist-edu.png" alt="">
        <strong>Edu</strong>
      </a>

    </div>

  </div>
</section>

</body>
</html>
